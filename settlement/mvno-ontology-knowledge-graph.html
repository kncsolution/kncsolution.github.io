function render(){const data=view==='schema'?classes:instances,edges=view==='schema'?schemaEdges:instanceEdges;domG.innerHTML='';Object.entries(domains).forEach(([k,d])=>{domG.insertAdjacentHTML('beforeend',`<rect class="domain-box" x="${d.x}" y="${d.y}" width="${d.w}" height="${d.h}"></rect><text class="domain-label" x="${d.x+15}" y="${d.y+24}">${d.label}</text>`)});const map=new Map(data.map(n=>[n.id,n]));edgeG.innerHTML=edges.filter(e=>map.has(e.s)&&map.has(e.t)).map((e,i)=>{const a=map.get(e.s),b=map.get(e.t),p=curve(a,b),mid={x:(point(a).x+point(b).x)/2,y:(point(a).y+point(b).y)/2};return `<path id="edge-${i}" class="edge ${e.type==='object'?'object':''} ${e.type==='instance'?'instance':''}" d="${p}" marker-end="url(#${e.type==='object'?'arrowObj':'arrow'})"></path><text class="edge-label" x="${mid.x}" y="${mid.y-4}">${e.label}</text>`}).join('');nodeG.innerHTML=data.map(n=>view==='schema'?`<g class="node domain-${n.domain}" data-id="${n.id}" transform="translate(${n.x},${n.y})"><rect width="110" height="52"></rect><text class="n-title" x="55" y="22">${n.label}</text><text class="n-sub" x="55" y="38">${n.id}</text></g>`:`<g class="node instance-node" data-id="${n.id}" transform="translate(${n.x},${n.y})"><circle cx="55" cy="25" r="38" fill="${colors[n.domain]}22" stroke="${colors[n.domain]}"></circle><text class="n-title" x="55" y="22">${n.label}</text><text class="n-sub" x="55" y="36">${n.type}</text></g>`).join('');document.querySelectorAll('.node').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();selectNode(el.dataset.id)}));applyTransform();if(selected&&map.has(selected))selectNode(selected);else clearDetail()}
function selectNode(id){selected=id;const data=view==='schema'?classes:instances,edges=view==='schema'?schemaEdges:instanceEdges,n=data.find(x=>x.id===id);document.querySelectorAll('.node').forEach(x=>x.classList.toggle('selected',x.dataset.id===id));const neigh=new Set([id]);edges.filter(e=>e.s===id||e.t===id).forEach(e=>{neigh.add(e.s);neigh.add(e.t)});document.querySelectorAll('.node').forEach(x=>x.classList.toggle('dim',!neigh.has(x.dataset.id)));document.querySelectorAll('.edge,.edge-label').forEach(x=>x.classList.remove('dim'));document.getElementById('empty').style.display='none';document.getElementById('detail').style.display='block';document.getElementById('dType').textContent=view==='schema'?'OWL CLASS':'RDF INSTANCE';document.getElementById('dTitle').textContent=n.label;document.getElementById('dDesc').textContent=n.desc||`${n.sub||n.type}에 속하는 ${view==='schema'?'온톨로지 클래스':'예제 인스턴스'}입니다.`;document.getElementById('dId').textContent=':'+n.id;document.getElementById('dProps').innerHTML=(n.props?.length?n.props:['정의된 데이터 속성 없음']).map(x=>`<span class="chip">${x}</span>`).join('');document.getElementById('dRels').innerHTML=edges.filter(e=>e.s===id||e.t===id).map(e=>`<div class="rel"><b>${e.s===id?'→':'←'} ${e.s===id?e.t:e.s}</b><span>${e.label}</span></div>`).join('')||'<span class="chip">연결 관계 없음</span>';document.getElementById('formulaSection').style.display=n.formula?'block':'none';document.getElementById('dFormula').textContent=n.formula||''}
function clearDetail(){selected=null;document.querySelectorAll('.node').forEach(x=>x.classList.remove('selected','dim','match'));document.getElementById('empty').style.display='grid';document.getElementById('detail').style.display='none'}
function applyTransform(){vp.setAttribute('transform',`translate(${pan.x} ${pan.y}) scale(${scale})`)}
function zoomAt(f){scale=Math.max(.45,Math.min(2.1,scale*f));applyTransform()}
document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>{view=b.dataset.view;document.querySelectorAll('[data-view]').forEach(x=>x.classList.toggle('active',x===b));trace=false;selected=null;render()});
document.getElementById('search').addEventListener('input',e=>{const q=e.target.value.trim().toLowerCase();document.querySelectorAll('.node').forEach(n=>{const hit=!q||n.textContent.toLowerCase().includes(q);n.classList.toggle('dim',!hit);n.classList.toggle('match',!!q&&hit)})});
document.getElementById('traceBtn').onclick=()=>{if(view!=='instance'){document.querySelector('[data-view="instance"]').click()}trace=!trace;const path=['Subscriber_John','Product_Data100G','Rate_Alpha_Data100G','Item_John_BaseFee','Invoice_Alpha_202506'];document.getElementById('traceBtn').classList.toggle('active',trace);if(trace){selectNode('Item_John_BaseFee');document.querySelectorAll('.node').forEach(n=>n.classList.toggle('dim',!path.includes(n.dataset.id)))}else clearDetail()};
document.getElementById('fitBtn').onclick=()=>{scale=1;pan={x:0,y:0};applyTransform()};document.getElementById('zoomIn').onclick=()=>zoomAt(1.18);document.getElementById('zoomOut').onclick=()=>zoomAt(.84);
svg.addEventListener('wheel',e=>{e.preventDefault();zoomAt(e.deltaY<0?1.1:.9)},{passive:false});svg.addEventListener('pointerdown',e=>{if(e.target.closest('.node'))return;drag={x:e.clientX,y:e.clientY,px:pan.x,py:pan.y};svg.classList.add('dragging');svg.setPointerCapture(e.pointerId)});svg.addEventListener('pointermove',e=>{if(!drag)return;pan.x=drag.px+(e.clientX-drag.x);pan.y=drag.py+(e.clientY-drag.y);applyTransform()});svg.addEventListener('pointerup',()=>{drag=null;svg.classList.remove('dragging')});svg.addEventListener('click',e=>{if(e.target===svg)clearDetail()});
render();
</script>
</body>
</html>
