<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/><title>MVNO 통합 v8 — 레이아웃 개선</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reactflow@11/dist/style.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/reactflow@11/dist/umd/index.js"></script>
<style>
:root{
  --bg:#0a0f1e;--bg2:#0d1117;--bg3:#111827;--bg4:#1a2332;--bg5:#1f2d40;--bg6:#2d3748;
  --bg-sel:#1d3461;--bg2a:#0d1117cc;
  --txt:#e6edf3;--txt2:#c9d1d9;--txt3:#8b949e;--txt4:#6b7280;
  --acc:#60a5fa;--acc2:#93c5fd;--gold:#fbbf24;--grn:#3fb950;--red:#f85149;
  --bdr:#1a2332;--bdr2:#1f2d40;--shd:rgba(0,0,0,.5);
  --wi-rst:#374151;
  --g-bg:#0a0f1e;--g-nl:rgba(255,255,255,.9);--g-ns:rgba(255,255,255,.45);
  --g-ll:#4b5563;--g-lsub:#2d3748;--g-lobj:#1e3a5f;
  --g-cnt-bg:#111827cc;--g-cnt-bdr:#1f2d40;--g-cnt-txt:#6b7280;
}
body.light{
  --bg:#f0f4f8;--bg2:#ffffff;--bg3:#ffffff;--bg4:#f8fafc;--bg5:#f1f5f9;--bg6:#e2e8f0;
  --bg-sel:#dbeafe;--bg2a:#ffffffcc;
  --txt:#1e293b;--txt2:#374151;--txt3:#64748b;--txt4:#94a3b8;
  --acc:#2563eb;--acc2:#3b82f6;--gold:#d97706;--grn:#16a34a;--red:#dc2626;
  --bdr:#e2e8f0;--bdr2:#e2e8f0;--shd:rgba(0,0,0,.12);
  --wi-rst:#e2e8f0;
  --g-bg:#e8eef6;--g-nl:rgba(15,23,42,.88);--g-ns:rgba(15,23,42,.5);
  --g-ll:#64748b;--g-lsub:#94a3b8;--g-lobj:#3b82f6;
  --g-cnt-bg:#ffffffcc;--g-cnt-bdr:#cbd5e1;--g-cnt-txt:#475569;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI','Malgun Gothic',sans-serif;background:var(--bg);color:var(--txt);height:100vh;overflow:hidden;display:flex;flex-direction:column;transition:background .25s,color .25s}
#hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;background:var(--bg2a);backdrop-filter:blur(8px);border-bottom:1px solid var(--bdr);flex-shrink:0;z-index:30;position:relative}
#hdr h1{font-size:15px;font-weight:700;color:var(--acc)}
#hdr .sub{font-size:10px;color:var(--txt3);margin-top:2px}
#hdr-btns{display:flex;gap:6px;align-items:center}
.hb{padding:5px 12px;border:1px solid var(--bdr2);background:var(--bg4);color:var(--txt3);border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;transition:all .15s}
.hb:hover,.hb.active{background:#1d4ed8;border-color:#1d4ed8;color:white}
#btn-theme{padding:4px 9px;border:1px solid var(--bdr2);background:var(--bg4);border-radius:6px;cursor:pointer;font-size:15px;line-height:1.4;transition:all .15s;color:var(--txt)}
#btn-theme:hover{background:var(--bg5)}
#graph-area{flex:1;position:relative;overflow:hidden;background:var(--g-bg);transition:background .25s}
#rf-root{width:100%;height:100%;position:absolute;top:0;left:0;display:block}
.react-flow__background{background:var(--g-bg)!important}
.react-flow__edges{z-index:0!important}
.react-flow__nodes{z-index:5!important}
.react-flow__controls{background:var(--bg3)!important;border:1px solid var(--bdr2)!important;border-radius:8px!important}
.react-flow__controls button{background:var(--bg4)!important;border-color:var(--bdr2)!important;color:var(--txt)!important}
.react-flow__controls button:hover{background:var(--bg5)!important}
.react-flow__minimap{background:var(--bg2)!important;border:1px solid var(--bdr2)!important}
.rf-ont-node{border-radius:9px;padding:5px 12px;min-width:90px;text-align:center;cursor:pointer;transition:all .15s;font-family:'Segoe UI','Malgun Gothic',sans-serif}
.rf-ont-node:hover{filter:brightness(1.15)}
.rf-ont-node .rn-label{font-size:10.5px;font-weight:700;pointer-events:none}
.rf-ont-node .rn-sub{font-size:8.5px;color:#6b7280;margin-top:1px;pointer-events:none}
.rf-ont-node .rn-abs{font-size:8px;color:#fbbf24;margin-top:1px;pointer-events:none}
.rf-ont-node .rn-mcode{font-size:8px;color:#f87171;margin-top:1px;pointer-events:none}
.rf-ont-node .rn-expand{font-size:8px;color:#6b7280;margin-top:3px;border-top:1px solid #1f2d4088;padding-top:2px;pointer-events:none}
.rf-ont-node .rn-expand.open{color:#3fb950}
.rf-scode-node{border-radius:0 7px 7px 0;padding:5px 10px;min-width:96px;text-align:left;cursor:default;font-family:'Segoe UI','Malgun Gothic',sans-serif;border-left:3px solid #ef4444}
.rsc-code{font-size:10px;font-weight:700;color:#f87171;pointer-events:none}
.rsc-name{font-size:8.5px;color:#9ca3af;margin-top:1px;pointer-events:none}
.rsc-src{font-size:8px;color:#4b5563;margin-top:2px;pointer-events:none}
#tree-svg{width:100%;height:100%;display:none;position:absolute;top:0;left:0}
#ont-tree-svg{width:100%;height:100%;display:none;position:absolute;top:0;left:0}
.otlink-sub{fill:none;stroke:var(--g-lsub);stroke-width:1.4;opacity:.75}
.otlink-obj{fill:none;stroke:#fbbf24;stroke-width:1;stroke-dasharray:5 3;opacity:.45}
.tlink{fill:none;stroke:var(--g-lsub);stroke-width:1.5;opacity:.7}
.tnode-rect{stroke-width:1.5;transition:stroke .2s,fill .2s}
.tnode-mno{fill:#7c3aed22;stroke:#7c3aed}
.tnode-mvno{fill:var(--bg4);stroke:var(--acc)}
.tnode-lbl{font-size:10px;fill:var(--g-nl);font-weight:700;pointer-events:none}
.tnode-lbl-mno{font-size:13px;fill:#c084fc;font-weight:800}
.tnode-amt{font-size:9px;fill:#fbbf24;pointer-events:none}
.tnode-sub{font-size:8px;fill:var(--g-ns);pointer-events:none}
#hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;transition:opacity .5s;z-index:5}
#hint h2{font-size:22px;font-weight:800;color:var(--acc);margin-bottom:8px}
#hint p{font-size:13px;color:var(--txt4)}
#slide{position:absolute;top:0;right:0;width:460px;min-width:300px;max-width:800px;height:100%;background:var(--bg3);border-left:1px solid var(--bdr2);transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);z-index:20;display:flex;flex-direction:column;overflow:hidden}
#slide.open{transform:translateX(0)}
#slide-resize{position:absolute;top:0;left:0;width:5px;height:100%;cursor:ew-resize;z-index:30;background:transparent;transition:background .15s}
#slide-resize:hover,#slide-resize.dragging{background:#60a5fa44}
.trace-step{display:flex;gap:10px;padding:10px 8px;position:relative;border-left:3px solid transparent;border-radius:4px;transition:background .15s,border-color .15s;margin:0 -8px}
.trace-step:hover{background:#1a2332aa}
.trace-step:not(:last-child)::after{content:'';position:absolute;left:15px;top:32px;width:2px;bottom:-4px;background:linear-gradient(#60a5fa44,#60a5fa22)}
.trace-dot{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;border:2px solid transparent}
.trace-body{flex:1;min-width:0}
.trace-node{font-size:10px;font-weight:700;margin-bottom:2px}
.trace-vals{background:var(--bg2);border-radius:6px;padding:6px 8px;font-size:10px}
.trace-val-row{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid var(--bdr2)}
.trace-val-row:last-child{border-bottom:none}
.trace-result{background:#fbbf2422;border:1px solid #fbbf2444;border-radius:8px;padding:10px;text-align:center;margin-top:6px}
#slide-tabs-mc{display:none;background:var(--bg2);border-bottom:1px solid var(--bdr2);padding:0 2px;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
#slide-tabs-mc::-webkit-scrollbar{display:none}
#slide-hdr{padding:14px 16px;background:var(--bg2);border-bottom:1px solid var(--bdr2);display:flex;align-items:center;gap:10px;flex-shrink:0}
#slide-title{font-weight:700;font-size:14px;flex:1}
#slide-close{width:28px;height:28px;background:var(--bg5);border:none;color:var(--txt3);border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
#slide-close:hover{background:var(--bg6);color:var(--txt)}
#slide-tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--bdr2);padding:0 4px;flex-shrink:0;overflow-x:hidden}
#slide-tabs-mc{display:none;background:var(--bg2);border-bottom:1px solid var(--bdr2);padding:0 4px;flex-shrink:0}
.sl-tab{padding:9px 8px;font-size:11px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;color:var(--txt4);white-space:nowrap;flex:1;text-align:center}
.sl-tab.active{border-bottom-color:var(--acc);color:var(--txt)}
#slide-body{flex:1;overflow-y:auto;padding:14px;background:var(--bg3)}
.cls-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;margin-bottom:4px}
.cls-sub-lbl{font-size:11px;color:var(--txt4);margin-top:2px}
.prop-chip{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;margin:2px;background:var(--bg5);color:var(--acc2);font-family:monospace}
.rel-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--bdr2);font-size:11px}
.rel-arrow{color:var(--txt4);flex-shrink:0}
.rel-lbl{color:var(--acc);font-weight:600;flex:1}
.rel-target{color:var(--txt2)}
.sub-item{border-radius:8px;padding:10px;margin-bottom:7px;cursor:pointer;border:1.5px solid var(--bdr2);background:var(--bg4);transition:all .2s}
.sub-item:hover{border-color:var(--bg6);background:var(--bg5)}
.sub-item.active{border-color:var(--acc);background:var(--bg-sel)}
.si-name{font-weight:700;font-size:12px;margin-bottom:4px;color:var(--txt)}
.si-meta{font-size:10px;color:var(--txt4);display:flex;gap:8px;flex-wrap:wrap}
.si-amt{font-size:15px;font-weight:800;color:var(--gold);margin-top:4px}
.det-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bdr2);font-size:12px}
.det-row:last-child{border-bottom:none}
.det-lbl{color:var(--txt4)}
.det-val{font-weight:700;color:var(--txt)}
#btn-sample{padding:5px 12px;border:1px solid #f59e0b66;background:#451a0322;color:#f59e0b;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;transition:all .15s}
#btn-sample:hover,#btn-sample.active{background:#92400e;border-color:#f59e0b;color:#fde68a}
.inst-step{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--bdr2);align-items:flex-start}
.inst-step:last-child{border-bottom:none}
.inst-node-badge{min-width:110px;padding:4px 8px;border-radius:6px;font-size:9px;font-weight:800;letter-spacing:.03em;text-align:center}
.inst-vals{flex:1}
.inst-val-row{font-size:11px;color:var(--txt2);margin-bottom:2px}
.inst-val-key{color:var(--txt4);font-size:10px}
.inst-calc-box{margin-top:14px;padding:14px;background:var(--bg4);border-radius:10px;border:1.5px solid #fbbf2466}
.inst-calc-title{font-size:10px;font-weight:700;color:#fbbf24;margin-bottom:8px;letter-spacing:.04em}
.inst-calc-eq{font-size:20px;font-weight:900;color:#fde68a;text-align:center;margin:8px 0}
.inst-calc-detail{font-size:11px;color:var(--txt3);text-align:center}
.det-tot{background:var(--bg-sel);border-radius:8px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.det-tot-lbl{font-size:11px;color:var(--acc2)}
.det-tot-val{font-size:18px;font-weight:800;color:var(--gold)}
.wi-lbl{font-size:10px;color:var(--txt4);font-weight:600;margin-bottom:4px}
.wi-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.wi-slider{flex:1;accent-color:var(--acc)}
.wi-val{width:40px;text-align:right;font-size:11px;font-weight:700;color:var(--acc)}
.wi-input{width:100%;padding:7px 9px;background:var(--bg5);border:1px solid var(--bg6);border-radius:6px;color:var(--txt);font-size:12px}
.wi-btn{width:100%;padding:9px;background:#7c3aed;border:none;border-radius:7px;color:white;font-size:12px;font-weight:700;cursor:pointer;margin-top:8px}
.wi-btn-reset{background:var(--wi-rst);color:var(--txt);margin-top:4px;border:1px solid var(--bdr2)}
.cmp-table{width:100%;border-collapse:collapse;font-size:11px}
.cmp-table th{background:var(--bg5);padding:6px;text-align:left;color:var(--txt4);font-weight:600;border-bottom:1px solid var(--bg6)}
.cmp-table td{padding:6px;border-bottom:1px solid var(--bdr2);color:var(--txt)}
.dp{color:var(--grn);font-weight:700}
.dn{color:var(--red);font-weight:700}
.bdg{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600}
.bo{background:#d9730033;color:#e3b341}
.bb{background:#1f6feb33;color:#60a5fa}
.br{background:#f851491a;color:#f85149}
#gtip{position:absolute;background:var(--bg3);border:1px solid var(--bdr2);border-radius:8px;padding:9px 11px;pointer-events:none;font-size:11px;max-width:200px;display:none;z-index:50;line-height:1.7;box-shadow:0 8px 24px var(--shd);color:var(--txt)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
#counter{position:absolute;bottom:14px;left:14px;background:var(--g-cnt-bg);backdrop-filter:blur(4px);border:1px solid var(--g-cnt-bdr);border-radius:8px;padding:7px 12px;font-size:11px;color:var(--g-cnt-txt);transition:background .25s,border-color .25s;z-index:10}
#counter span{color:var(--acc);font-weight:700}
#path-btn{position:absolute;bottom:14px;left:140px;background:#7c3aed;border:none;border-radius:8px;padding:7px 14px;color:white;font-size:11px;font-weight:700;cursor:pointer;display:none;z-index:10}
#path-btn:hover{background:#6d28d9}
.cat-hdr{padding:5px 8px;margin:10px 0 3px;border-radius:0 4px 4px 0;display:flex;justify-content:space-between;align-items:center}
.cat-hdr-lbl{font-size:10px;font-weight:700}
.cat-hdr-amt{font-size:10px;color:var(--txt4)}
.det-row-zero{opacity:.35}
.neg-amt{color:var(--grn)!important}
.srch-bar{display:flex;gap:5px;margin-bottom:10px;align-items:center}
.srch-input{flex:1;padding:6px 9px;background:var(--bg5);border:1px solid var(--bg6);border-radius:6px;color:var(--txt);font-size:11px;outline:none}
.srch-input:focus{border-color:var(--acc)}
.srch-select{padding:6px 6px;background:var(--bg5);border:1px solid var(--bg6);border-radius:6px;color:var(--txt);font-size:10px;outline:none;cursor:pointer}
.srch-chip{padding:3px 8px;border-radius:10px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--bdr2);background:var(--bg5);color:var(--txt4);white-space:nowrap}
.srch-chip.on{background:#1d4ed8;border-color:#1d4ed8;color:white}
.mvno-card{background:var(--bg4);border:1px solid var(--bdr2);border-radius:10px;padding:12px;margin-bottom:10px}
.mvno-sum-row{display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:1px solid var(--bdr2)}
.mvno-sum-row:last-child{border-bottom:none}
.mvno-sum-lbl{color:var(--txt4);font-size:10px}
.mvno-sum-val{font-weight:700;color:var(--txt)}
.mvno-grand{background:linear-gradient(135deg,var(--bg-sel),var(--bg4));border:1px solid var(--acc);border-radius:10px;padding:12px;margin-bottom:10px}
.mvno-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.mvno-stat{background:var(--bg4);border:1px solid var(--bdr2);border-radius:8px;padding:8px 10px;text-align:center}
.mvno-stat-val{font-size:14px;font-weight:800;color:var(--gold)}
.mvno-stat-lbl{font-size:9px;color:var(--txt4);margin-top:2px}
.prod-section{margin-bottom:12px}
.prod-hdr{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:var(--bg5);border-radius:7px;cursor:pointer;margin-bottom:4px;border:1px solid var(--bdr2)}
.prod-hdr:hover{background:var(--bg6)}
.prod-hdr-name{font-size:11px;font-weight:700;color:var(--txt)}
.prod-hdr-meta{font-size:10px;color:var(--txt4)}
.prod-hdr-amt{font-size:12px;font-weight:800;color:var(--gold)}
.prod-body{display:none;padding:0 4px}
.prod-body.open{display:block}
.vb{padding:5px 11px;border:1px solid var(--bdr2);background:var(--bg4);color:var(--txt3);border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;transition:all .15s}
.vb.active{background:#7c3aed;border-color:#7c3aed;color:white}
#slide-drag{position:absolute;left:0;top:0;bottom:0;width:5px;cursor:col-resize;z-index:30;background:transparent;transition:background .15s}
#slide-drag:hover,#slide-drag.dragging{background:var(--acc);opacity:.55}
#tree-counter{position:absolute;bottom:14px;left:14px;background:var(--g-cnt-bg);backdrop-filter:blur(4px);border:1px solid var(--g-cnt-bdr);border-radius:8px;padding:7px 12px;font-size:11px;color:var(--g-cnt-txt);display:none;z-index:10}
#tree-counter span{color:var(--acc);font-weight:700}
#mvno-style-bar{position:absolute;top:10px;left:50%;transform:translateX(-50%);display:none;align-items:center;gap:4px;background:var(--g-cnt-bg);backdrop-filter:blur(8px);border:1px solid var(--g-cnt-bdr);border-radius:20px;padding:4px 8px;z-index:15}
.sb{padding:4px 13px;border:none;background:transparent;color:var(--g-cnt-txt);border-radius:14px;cursor:pointer;font-size:11px;font-weight:600;transition:all .15s;white-space:nowrap}
.sb:hover{background:var(--bg5)}
.sb.active{background:var(--acc);color:white}
.sb-sep{width:1px;height:16px;background:var(--g-cnt-bdr);display:inline-block;margin:0 2px}
.sb-legend{font-size:10px;color:var(--g-cnt-txt);padding-left:8px;display:flex;align-items:center;gap:5px;white-space:nowrap}
.ghost-dot{width:12px;height:12px;border-radius:50%;border:1.5px dashed #94a3b8;display:inline-block;flex-shrink:0}
.mc-tbl{width:100%;border-collapse:collapse;font-size:11px;margin-top:4px}
.mc-tbl th{background:var(--bg4);padding:6px 8px;text-align:left;color:var(--txt4);font-weight:600;border-bottom:1px solid var(--bg6);white-space:nowrap;font-size:10px}
.mc-tbl td{padding:6px 8px;border-bottom:1px solid var(--bdr2);color:var(--txt);font-size:11px}
.mc-tbl tr:hover td{background:var(--bg5)}
.mc-tbl td.num{text-align:right;font-weight:700}
.mc-tbl tr.tot-row td{background:var(--bg-sel);font-weight:800;color:var(--gold)}
.mc-inst-item{border-radius:8px;padding:10px;margin-bottom:7px;cursor:pointer;border:1.5px solid var(--bdr2);background:var(--bg4);transition:all .2s}
.mc-inst-item:hover{border-color:#ef444488;background:var(--bg5)}
.mc-inst-item.active{border-color:#ef4444;background:#ef444411}
.mc-calc-box{margin-top:10px;padding:12px;background:var(--bg5);border-radius:8px;border:1.5px solid #ef444455}
.mc-plan-card{background:var(--bg4);border:1px solid var(--bdr2);border-radius:8px;padding:10px;margin-bottom:8px}
.mc-section-hdr{font-size:10px;color:var(--txt4);font-weight:700;margin:10px 0 6px;padding-top:8px;border-top:1px solid var(--bdr2)}
.mc-section-hdr:first-child{border-top:none;margin-top:0}
#mvno-tip{position:absolute;background:var(--bg3);border:1px solid var(--bdr2);border-radius:8px;padding:9px 11px;pointer-events:none;font-size:11px;max-width:200px;display:none;z-index:50;line-height:1.7;box-shadow:0 8px 24px var(--shd);color:var(--txt)}
</style>
</head>
<body>
<div id="hdr">
  <div>
    <h1>🔗 MVNO 정산 온톨로지 <span style="font-size:11px;opacity:.6;font-weight:400">v8 — 레이아웃 개선</span></h1>
    <div class="sub">8단계 레이어 · M코드 더블클릭→소코드 확장 · 드래그 가능 · 클래스 클릭→슬라이드 패널</div>

function calcDays(join,p){
  const j=new Date(join),ps=new Date(p.year,p.month-1,1),pe=new Date(p.year,p.month,0);
  const s=j>ps?j:ps;
  return Math.min(Math.max(0,Math.floor((pe-s)/86400000)+1),p.totalDays);
}
function calcAllItems(sub,prod,rate,period,ov={}){

  const days=calcDays(ws.joinDate,period);

  const excV=Math.max(0,(ws.usedVoice||0)-(prod.includedVoice||0));

  const excSMS=Math.max(0,((ws.usedSMS||0)+(ws.usedMMSText||0)+(ws.usedMMSMedia||0))-(prod.includedSMS||0));
  const excData=Math.max(0,(ws.usedData||0)-(prod.includedData||0));
  const i01=prod.baseFee*r.wholesaleRate*(days/period.totalDays);
  const i02=ws.isPrepaid?r.subUnitPrepaid:0;const i03=ws.isESIM?r.subUnitESIM:0;
  const i04=joinedBefore?r.prePeriodUnit:0;const i05=r.postPeriodUnit;
  const i06=r.billingChargeFee;const i07=r.billingAgencyFee;
  const i08=r.bizSystemFee;const i09=r.collectionFee;
  const i10=(ws.intlVoice||0)*r.intlVoiceRate;const i11=(ws.intlSMS||0)*r.intlSMSRate;
  const i12=ws.isPrepaid?r.prepaidInfoFee:0;const i13=ws.isPrepaid?r.prepaidVAS:0;
  const i14=ws.isPrepaid?r.vasIncentive:0;const i15=ws.isPrepaid?(ws.prepaidChargeAmt||0)*r.prepaidChargeRate:0;
  const i16=excV*r.excessVoiceRate;const i17=excVid*r.excessVideoRate;
  const i18=excSMS*r.excessSMSRate;const i19=excData*1024*r.excessDataRate;
  const i20=(ws.usedVoice||0)*r.voiceTotalRate;const i21=(ws.usedVideo||0)*r.videoTotalRate;
  const i22=(ws.usedSMS||0)*r.smsTotalRate;const i23=(ws.usedMMSText||0)*r.mmsTextRate;

  const i28=(ws.usedVoice||0)*r.subVoiceTotalRate;const i29=(ws.usedSMS||0)*r.subSMSTotalRate;
  const i30=(ws.usedData||0)*r.subDataTotalRate;
  const base30=[i01,i02,i03,i04,i05,i06,i07,i08,i09,i10,i11,i12,i13,i14,i15,
    i16,i17,i18,i19,i20,i21,i22,i23,i24,i25,i26,i27,i28,i29,i30];
  const rsBase=base30.reduce((a,b)=>a+(b>0?b:0),0);
  const i31=rsBase*r.rsBillingRate;const i32=rsBase*r.rsCollectionRate;
  const i33=-(rsBase*r.rsDeductRate);const i34=ws.isPrepaid?0:r.postpaidVASIncentive;

  const memo={};

function buildRFLayout(settExpanded,expandedMCodes){
  const NW=RF_NW,NH=RF_NH,HGAP=18,RH=NH+RF_VGAP;
  const SW=104,SHGAP=8,SGROUP_GAP=16,S_GAP=18,ROW_GAP=18,MROW_YGAP=30;
  const posMap={};
  const layerMinX={};
  RF_LAYER_IDS.slice(0,5).forEach((ids,ri)=>{
    const total=ids.length;
    const rowW=total*NW+(total-1)*HGAP;
    ids.forEach((id,ci)=>{posMap[id]={x:ci*(NW+HGAP)-rowW/2,y:ri*RH};});
    layerMinX[ri]=ids.length?-rowW/2-10:0;
  });
  // M코드 2행 배치 (앞 10 / 뒤 9)
  const MC_PER_ROW=10,MHGAP=18;
  const mcA=SETT_CODE_TABLE.slice(0,MC_PER_ROW);
  const mcB=SETT_CODE_TABLE.slice(MC_PER_ROW);
  const rowAW=mcA.length*(NW+MHGAP)-MHGAP;
  const rowBW=mcB.length*(NW+MHGAP)-MHGAP;
  // 1행 M코드 중 확장된 것이 있으면 2행을 아래로 밀어냄
  const hasExpandedA=mcA.some(mc=>expandedMCodes&&expandedMCodes.has(mc.id));
  const hasExpandedB=mcB.some(mc=>expandedMCodes&&expandedMCodes.has(mc.id));
  const ROW_A_Y=5*RH;
  const S_ROW_A_Y=ROW_A_Y+NH+S_GAP;
  const ROW_B_Y=hasExpandedA?S_ROW_A_Y+NH+ROW_GAP:ROW_A_Y+NH+MROW_YGAP;
  const S_ROW_B_Y=ROW_B_Y+NH+S_GAP;
  mcA.forEach((mc,i)=>{posMap[mc.id]={x:i*(NW+MHGAP)-rowAW/2,y:ROW_A_Y};});
  mcB.forEach((mc,i)=>{posMap[mc.id]={x:i*(NW+MHGAP)-rowBW/2,y:ROW_B_Y};});
  layerMinX[5]=-Math.max(rowAW,rowBW)/2-10;
  // S코드: 각 행별로 부모 M코드 바로 아래에 배치, 그룹 겹침 시 오른쪽으로 밀어냄
  const scodePositions={};
  function placeScodeRow(mcs,scY){
    const expanded=mcs.filter(mc=>expandedMCodes&&expandedMCodes.has(mc.id));
    if(!expanded.length)return;
    const groups=expanded.map(mc=>{
      const mPos=posMap[mc.id];
      const cnt=mc.subs.length;
      const groupW=cnt*(SW+SHGAP)-SHGAP;
      return{mc,groupW,actualX:mPos.x+NW/2-groupW/2};
    }).sort((a,b)=>a.actualX-b.actualX);
    for(let i=1;i<groups.length;i++){
      const minX=groups[i-1].actualX+groups[i-1].groupW+SGROUP_GAP;
      if(groups[i].actualX<minX)groups[i].actualX=minX;
    }
    groups.forEach(({mc,actualX})=>{
      mc.subs.forEach((s,si)=>{scodePositions[s.scode]={x:actualX+si*(SW+SHGAP),y:scY};});
    });
  }
  placeScodeRow(mcA,S_ROW_A_Y);
  placeScodeRow(mcB,S_ROW_B_Y);
  Object.assign(posMap,scodePositions);
  const scXArr=Object.values(scodePositions).map(p=>p.x);
  layerMinX[6]=scXArr.length?Math.min(...scXArr)-10:layerMinX[5];
  const layerY={};
  for(let i=0;i<5;i++)layerY[i]=i*RH;
  layerY[5]=ROW_A_Y;
  const firstScY=hasExpandedA?S_ROW_A_Y:hasExpandedB?S_ROW_B_Y:S_ROW_B_Y;
  layerY[6]=firstScY;
  nodes.forEach(n=>{if(!posMap[n.id])posMap[n.id]={x:0,y:0};});
  return{posMap,layerMinX,scodePositions,layerY};
}

      if(!visibleIds.has(l.s)||!visibleIds.has(l.t))return;
      const sp=posMap[l.s]||{x:0,y:0};
      const tp=posMap[l.t]||{x:0,y:0};
      const dy=tp.y-sp.y,dx=tp.x-sp.x;
      const sameRow=Math.abs(dy)<30;
      const tSide=sameRow?(dx>=0?'left':'right'):(dy>0?'top':'bottom');
      const sSide=sameRow?(dx>=0?'right':'left'):(dy>0?'bottom':'top');
      const tk=`${l.t}|${tSide}`;
      const sk=`${l.s}|${sSide}`;
      if(!tgtGroups[tk])tgtGroups[tk]=[];
      tgtGroups[tk].push({i,sp,tp});
      if(!srcGroups[sk])srcGroups[sk]=[];
      srcGroups[sk].push({i,sp,tp});
    });
    const edgeTgtH={};
    const edgeSrcH={};
    Object.entries(tgtGroups).forEach(([key,group])=>{
      if(group.length<=1)return;
      const side=key.split('|')[1];
      group.sort((a,b)=>a.sp.x-b.sp.x);
      group.forEach(({i},gi)=>{
        if(side==='top')       edgeTgtH[i]=gi===0?'t-top-l' :gi===1?'t-top'   :'t-top-r';
        else if(side==='bottom')edgeTgtH[i]=gi===0?'t-bot-l' :gi===1?'t-bottom':'t-bot-r';
        else if(side==='left') edgeTgtH[i]=gi===0?'t-left-t':gi===1?'t-left'  :'t-left-b';
        else                   edgeTgtH[i]=gi===0?'t-right-t':gi===1?'t-right' :'t-right-b';
      });
    });
    Object.entries(srcGroups).forEach(([key,group])=>{
      if(group.length<=1)return;
      const side=key.split('|')[1];
      group.sort((a,b)=>a.tp.x-b.tp.x);
      group.forEach(({i},gi)=>{
        if(side==='bottom')    edgeSrcH[i]=gi===0?'s-bot-l' :gi===1?'s-bottom':'s-bot-r';
        else if(side==='top')  edgeSrcH[i]=gi===0?'s-top-l' :gi===1?'s-top'   :'s-top-r';
        else if(side==='right')edgeSrcH[i]=gi===0?'s-right-t':gi===1?'s-right' :'s-right-b';
        else                   edgeSrcH[i]=gi===0?'s-left-t' :gi===1?'s-left'  :'s-left-b';
      });
    });
    const ontEdges=[];
    OWL_LINKS.forEach((l,i)=>{
      if(!visibleIds.has(l.s)||!visibleIds.has(l.t))return;
      const isSub=l.type==='sub';
      const sp=posMap[l.s]||{x:0,y:0};
      const tp=posMap[l.t]||{x:0,y:0};
      const dy=tp.y-sp.y,dx=tp.x-sp.x;
      const sameRow=Math.abs(dy)<30;
      let srcH=sameRow?(dx>=0?'s-right':'s-left'):(dy>0?'s-bottom':'s-top');
      let tgtH=sameRow?(dx>=0?'t-left':'t-right'):(dy>0?'t-top':'t-bottom');
      if(edgeSrcH[i])srcH=edgeSrcH[i];
      if(edgeTgtH[i])tgtH=edgeTgtH[i];
      ontEdges.push({
        id:`e_${i}_${l.s}_${l.t}`,source:l.s,target:l.t,
        type:'smoothstep',
        sourceHandle:srcH,targetHandle:tgtH,
        style:isSub
          ?{stroke:'#3b4f6b',strokeWidth:1.2,opacity:.7}
          :{stroke:'#fbbf24',strokeWidth:1,strokeDasharray:'5,3',opacity:.4},
        markerEnd:isSub?{type:MarkerType.ArrowClosed,color:'#334155',width:10,height:10}:undefined,
        label:!isSub?(l.lbl||''):undefined,
        labelStyle:{fill:'#fbbf24',fontSize:8,fontWeight:600},
        labelBgStyle:{fill:'#0a0f1e99',borderRadius:3,padding:2},
        data:{linkType:l.type,lbl:l.lbl||''},hidden:false,
      });
    });
    return ontEdges;
  },[rfLayout,initNodes]);
  const[rfNodes,setRFNodes,onNodesChange]=useNodesState(initNodes);
  const[rfEdges,setRFEdges,onEdgesChange]=useEdgesState(initEdges);
  const{fitView}=useReactFlow();
  React.useEffect(()=>{
    setRFNodes(initNodes);setRFEdges(initEdges);
    setTimeout(()=>fitView({padding:.12,duration:500}),80);
  },[initNodes,initEdges]);
  React.useEffect(()=>{
    const selId=selClass;
    const sampleActive=_sampleActive;
    const pathIds=sampleActive?SAMPLE_INST.path:null;
    const isObj=e=>e.data?.linkType==='obj';
    const getLbl=e=>isObj(e)?(showKorean?(LABEL_KO[e.data?.lbl]||e.data?.lbl||''):(e.data?.lbl||'')):undefined;
    // ── 정산과정 트레이스 모드
    if(tracePath){
      setRFNodes(prev=>prev.map(n=>{
        const onPath=tracePath.has(n.id);
        const traceSelected=!!(traceSelId&&n.id===traceSelId);
        const dimmed=!onPath&&!traceSelected&&!n.id.startsWith('__layer_');
        return{...n,data:{...n.data,onPath,highlighted:false,traceSelected,dimmed,settExpanded,mExpanded:expandedMCodes.has(n.id),annot:null}};
      }));
      setRFEdges(prev=>prev.map(e=>{
        const onPath=tracePath.has(e.source)&&tracePath.has(e.target);
        const op=onPath?1:0.06;
        return{...e,hidden:false,label:getLbl(e),
          style:{...e.style,opacity:op},
          labelStyle:{...(e.labelStyle||{}),opacity:op},
          labelBgStyle:{...(e.labelBgStyle||{}),opacity:op}};
      }));
      return;
    }
    // ── 일반 선택 모드
    const connectedIds=new Set();
    if(selId&&!pathIds){
      connectedIds.add(selId);
      const scodeNode=OWL_NODES.find(n=>n.id===selId&&n.isScode);
      const mcodeEntry=SETT_CODE_TABLE.find(mc=>mc.id===selId);
      if(scodeNode){

        getMcodeContext(selId).forEach(id=>connectedIds.add(id));
      } else {
        // 일반 노드: 1홉 직접 연결
        OWL_LINKS.forEach(l=>{if(l.s===selId)connectedIds.add(l.t);if(l.t===selId)connectedIds.add(l.s);});
      }
    }
    setRFNodes(prev=>prev.map(n=>{

      return{...n,data:{...n.data,onPath,highlighted,dimmed,settExpanded,mExpanded:expandedMCodes.has(n.id),
        annot:sampleActive?(SAMPLE_INST.annot[n.id]||null):null}};
    }));
    setRFEdges(prev=>prev.map(e=>{

      const edgeLit=selId&&!pathIds&&connectedIds.has(e.source)&&connectedIds.has(e.target);
      const op=onPath?1:pathIds?0.08:(!selId?undefined:(edgeLit?0.9:0.08));
      return{...e,hidden:false,label:getLbl(e),
        style:{...e.style,opacity:op},
        labelStyle:{...(e.labelStyle||{}),opacity:op!==undefined?op:1},
        labelBgStyle:{...(e.labelBgStyle||{}),opacity:op!==undefined?op:1}};

  },[selClass,_sampleActive,settExpanded,expandedMCodes,showKorean,tracePath,traceSelId]);
  const onNodeClick=React.useCallback((_,node)=>{

  const onNodeDoubleClick=React.useCallback((_,node)=>{

      labelStyle:{...(e.labelStyle||{}),opacity:1},
      labelBgStyle:{...(e.labelBgStyle||{}),opacity:1}})));
  },[]);
  React.useEffect(()=>{
    const btn=document.getElementById('btn-fit');
    if(!btn)return;
    const hf=()=>fitView({padding:.12,duration:400});
    btn.addEventListener('click',hf);return()=>btn.removeEventListener('click',hf);
  },[fitView]);
  const rfStyle={width:'100%',height:'100%',background:'var(--g-bg)'};
  return h(RF,{
    nodes:rfNodes,edges:rfEdges,
    nodeTypes,
    onNodesChange,onEdgesChange,
    onNodeClick,onNodeDoubleClick,onPaneClick,
    fitView:true,fitViewOptions:{padding:.12},
    minZoom:.05,maxZoom:3,
    style:rfStyle,
  },

      maskColor:'#0a0f1eaa',style:{background:'#0d1117',border:'1px solid #1f2d40',borderRadius:8}}),
  );
}

function openSlideForClass(d){
  const isMCode=!!SETT_CODE_TABLE.find(x=>x.id===d.id);
  const isSCode=!!SETT_CODE_TABLE.flatMap(mc=>mc.subs).find(s=>s.scode===d.id);
  const isSettItem=d.id==='SettlementItem';
  State.selClass=d.id;State.selSub=null;
  const hint=document.getElementById('hint');if(hint)hint.style.opacity='0';
  const pb=document.getElementById('path-btn');if(pb)pb.style.display='none';
  if(isSettItem){_selMCode=null;_selSCode=null;openSettItemSlide(d);}
  else if(isMCode){_selMCode=d.id;_selSCode=null;_selMCodeInst=null;_mcInstSearch='';openMCodeSlide(d);}
  else if(isSCode){
    const parentMC=SETT_CODE_TABLE.find(mc=>mc.subs.some(s=>s.scode===d.id));

  else{_selMCode=null;_selSCode=null;openSlide(d);}
}

function getTraceNodeValues(step,inst,mcId,scId){
  const nid=step.nodeId;const mc=SETT_CODE_TABLE.find(x=>x.id===mcId);const sc=mc?.subs.find(s=>s.scode===scId);
  if(nid==='Subscriber')return[['고객명',inst.name],['MVNO',inst.mvno],['상태','활성']];
  if(nid==='SubscriberProduct')return[['요금제',inst.planName],['활성일수',`${inst.activeDays||30}/${inst.totalDays||30}일`],['M코드',mcId]];
  if(nid==='MVNOProduct')return[['상품명',inst.planName],['기본료',(inst.baseFee||0).toLocaleString()+'원'],['MVNO',inst.mvno]];
  if(nid==='MNOProduct')return[['모태상품명','LTE '+inst.planName],['MNO','KT'],['상품코드','KT-M-'+mcId]];
  if(nid==='SettlementRate')return[['요율/단가',inst.rate&&inst.rate<1?Math.round((inst.rate||0.8)*100)+'%':(inst.rate||0).toLocaleString()+'원'],['유형',inst.rate&&inst.rate<1?'도매대가율':'종량단가']];
  if(nid==='__SCODE__')return[['S코드',scId||inst.scode||'-'],['S코드명',sc?.name||'-'],['원본데이터',sc?.rawsrc||'-']];
  if(nid==='__MCODE__')return[['M코드',mcId],['M코드명',mc?.mid||mcId],['소분류수',mc?mc.subs.length+'개':'1개']];
  if(nid==='UsageData')return[['사용유형',mcId==='M0003'?'초과사용':'총량사용'],['사용량',(inst.excess||inst.used||0).toLocaleString()]];
  if(nid==='BillPayData')return[['청구금액',(inst.baseFee||10000).toLocaleString()+'원'],['청구일','2025-06-25']];
  if(nid==='BillingPeriod')return[['정산년월','2025년 06월'],['총일수','30일'],['상태','확정']];
  if(nid==='Invoice')return[['정산서번호','INV-2025-06-'+mcId],['MVNO',inst.mvno],['정산금액',fmtN(inst.settAmt)],['상태','발행완료']];
  return[['(값 없음)','-']];
}

function seededRng(seed){let s=seed>>>0;return()=>{s=(Math.imul(1664525,s)+1013904223)>>>0;return s/4294967296;};}
const MVNO_SUFFIXES=['알뜰폰','스마트텔','모바일넷','링크통신','디지털폰','에코텔','넥스트모바일','스피드텔','클라우드통신','원패스'];
const MVNO_DATA=(()=>{const d=[];
  for(let i=1;i<=50;i++){
    const r=seededRng(i*31337+999);const id=`MVNO_${String(i).padStart(3,'0')}`;
    const nm=MVNO_SUFFIXES[(i-1)%MVNO_SUFFIXES.length]+' '+String.fromCharCode(64+Math.ceil(i/MVNO_SUFFIXES.length));
    const subCount=Math.floor(r()*5000)+100;const prodCount=Math.floor(r()*5)+1;const cats={};
    SETT_CATS.forEach((cat,ci)=>{const r2=seededRng(i*777+ci*113+42);const base=r2()*15000000+500000;
      cats[cat.id]=cat.id==='rs'?-Math.round(base*.25/1000)*1000:Math.round(base/1000)*1000;});
    d.push({id,name:nm,subCount,prodCount,cats,total:Object.values(cats).reduce((a,b)=>a+b,0)});
  }return d;
})();
const MVNO_DATA_PP=(()=>{const d=[];
  for(let i=1;i<=50;i++){
    const r=seededRng(i*31337+555);const m=MVNO_DATA[i-1];const cats={};
    SETT_CATS.forEach((cat,ci)=>{const r2=seededRng(i*555+ci*77+11);const base=r2()*13000000+400000;
      cats[cat.id]=cat.id==='rs'?-Math.round(base*.25/1000)*1000:Math.round(base/1000)*1000;});
    d.push({id:m.id,name:m.name,subCount:Math.floor(r()*4500)+80,prodCount:m.prodCount,cats,total:Object.values(cats).reduce((a,b)=>a+b,0)});
  }return d;
})();

function renderRadialChart(W,H){
  const maxT=Math.max(...MVNO_DATA.map(m=>m.total));
  const sorted=[...MVNO_DATA].sort((a,b)=>b.total-a.total);const n=sorted.length;
  const R=Math.min(W,H)*0.42;const R0=Math.min(W,H)*0.08;

  const angleStep=(Math.PI*2)/n;

    const x=Math.cos(ang)*r;const y=Math.sin(ang)*r;const color=d3.interpolateTurbo(d.total/maxT);
    g.append('line').attr('x1',0).attr('y1',0).attr('x2',x).attr('y2',y).attr('stroke',color).attr('stroke-width',1.5).attr('opacity',.5);

}
function buildOntHierarchy(){
  const childrenOf={};const hasParent={};
  nodes.forEach(n=>{childrenOf[n.id]=[];});
  OWL_LINKS.forEach(l=>{if(l.type==='sub'){if(!childrenOf[l.t])childrenOf[l.t]=[];childrenOf[l.t].push(l.s);hasParent[l.s]=true;}});
  const rootIds=nodes.map(n=>n.id).filter(id=>!hasParent[id]);
  function makeNode(id){
    const n=nodes.find(x=>x.id===id)||{id,label:id,sub:'',domain:'settlement'};
    const ch=(childrenOf[id]||[]).map(cid=>makeNode(cid));
    return{id:n.id,label:n.label,sub:n.sub,domain:n.domain,abstract:n.abstract,children:ch.length?ch:undefined};
  }
  return d3.hierarchy({id:'_VRoot',label:'Settlement',sub:'정산 시스템',domain:'settlement',virtual:true,children:rootIds.map(rid=>makeNode(rid))});
}

      ${pct!==null?`<span style="font-size:10px;color:${diff>0?'var(--grn)':diff<0?'#ef4444':'var(--txt4)'}">${diff>0?'▲':'▼'} ${Math.abs(+pct)}% (전전월 대비)</span>`:''}
    </div></div>
  <div style="font-size:10px;color:var(--txt4);font-weight:700;margin-bottom:6px">항목별 정산</div>`;
  SETT_CATS.forEach(cat=>{const amt=d.cats[cat.id]||0;
    h2+=`<div class="mvno-sum-row"><span class="mvno-sum-lbl" style="color:${cat.color}">${cat.name}</span>
      <span class="mvno-sum-val${amt<0?' neg-amt':''}">${fmtN(amt)}</span></div>`;});
  if(prev){
    h2+=`<div style="font-size:10px;color:var(--txt4);font-weight:700;margin:10px 0 6px">전전월 비교</div>`;
    SETT_CATS.forEach(cat=>{const cur=d.cats[cat.id]||0;const pv=prev.cats[cat.id]||0;const dif=cur-pv;
      if(Math.abs(dif)<100)return;
      h2+=`<div class="mvno-sum-row"><span class="mvno-sum-lbl">${cat.name}</span>
        <span class="mvno-sum-val${dif<0?' neg-amt':''}">${dif>0?'+':''}${fmtN(dif)}</span></div>`;});
  }
  h2+=`<button class="wi-btn" style="margin-top:10px" onclick="openMVNOAllSlide()">← 전체 목록으로</button>`;
  return h2;
}
const mvnoTip=document.getElementById('mvno-tip');
function showMVNOTip(e,d){
  if(!mvnoTip)return;const r=document.getElementById('graph-area').getBoundingClientRect();
  const prev=MVNO_DATA_PP.find(p=>p.id===d.id);const diff=prev?d.total-prev.total:null;
  mvnoTip.innerHTML=`<div style="font-weight:700">${d.name}</div><div>가입자 ${d.subCount.toLocaleString()}명</div>
    <div>정산 합계: ${fmtN(d.total)}</div>
    ${diff!==null?`<div style="color:${diff>0?'#3fb950':'#ef4444'}">${diff>0?'▲':'▼'} ${fmtN(Math.abs(diff))}</div>`:''}`;
  mvnoTip.style.display='block';
  mvnoTip.style.left=(e.clientX-r.left+14)+'px';mvnoTip.style.top=(e.clientY-r.top-10)+'px';
}
function hideMVNOTip(){if(mvnoTip)mvnoTip.style.display='none';}
document.getElementById('tree-svg').addEventListener('mousemove',e=>{
  if(!mvnoTip||mvnoTip.style.display==='none')return;
  const r=document.getElementById('graph-area').getBoundingClientRect();
  mvnoTip.style.left=(e.clientX-r.left+14)+'px';mvnoTip.style.top=(e.clientY-r.top-10)+'px';
});
// ══════════════════════════════════════════════════════
// §V8_S7 — 초기화
// ══════════════════════════════════════════════════════
mountOntologyFlow();
switchView('ontology');
</script>
