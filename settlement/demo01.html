<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/><title>MVNO 통합 v4 — 슬라이드 패널</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
:root{
  --bg:#0a0f1e;--bg2:#0d1117;--bg3:#111827;--bg4:#1a2332;--bg5:#1f2d40;--bg6:#2d3748;
  --bg-sel:#1d3461;--bg2a:#0d1117cc;
  --txt:#e6edf3;--txt2:#c9d1d9;--txt3:#8b949e;--txt4:#6b7280;
  --acc:#60a5fa;--acc2:#93c5fd;--gold:#fbbf24;--grn:#3fb950;--red:#f85149;
  --bdr:#1a2332;--bdr2:#1f2d40;--shd:rgba(0,0,0,.5);
  --wi-rst:#374151;
  --g-bg:#0a0f1e;--g-nl:rgba(255,255,255,.9);--g-ns:rgba(255,255,255,.45);
  --g-ll:#4b5563;--g-lsub:#2d3748;--g-lobj:#1e3a5f;
  --g-cnt-bg:#111827cc;--g-cnt-bdr:#1f2d40;--g-cnt-txt:#6b7280;
}
body.light{
  --bg:#f0f4f8;--bg2:#ffffff;--bg3:#ffffff;--bg4:#f8fafc;--bg5:#f1f5f9;--bg6:#e2e8f0;
  --bg-sel:#dbeafe;--bg2a:#ffffffcc;
  --txt:#1e293b;--txt2:#374151;--txt3:#64748b;--txt4:#94a3b8;
  --acc:#2563eb;--acc2:#3b82f6;--gold:#d97706;--grn:#16a34a;--red:#dc2626;
  --bdr:#e2e8f0;--bdr2:#e2e8f0;--shd:rgba(0,0,0,.12);
  --wi-rst:#e2e8f0;
  --g-bg:#e8eef6;--g-nl:rgba(15,23,42,.88);--g-ns:rgba(15,23,42,.5);
  --g-ll:#64748b;--g-lsub:#94a3b8;--g-lobj:#3b82f6;
  --g-cnt-bg:#ffffffcc;--g-cnt-bdr:#cbd5e1;--g-cnt-txt:#475569;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI','Malgun Gothic',sans-serif;background:var(--bg);color:var(--txt);height:100vh;overflow:hidden;display:flex;flex-direction:column;transition:background .25s,color .25s}
#hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;background:var(--bg2a);backdrop-filter:blur(8px);border-bottom:1px solid var(--bdr);flex-shrink:0;z-index:30;position:relative}
#hdr h1{font-size:15px;font-weight:700;color:var(--acc)}
#hdr .sub{font-size:10px;color:var(--txt3);margin-top:2px}
#hdr-btns{display:flex;gap:6px;align-items:center}
.hb{padding:5px 12px;border:1px solid var(--bdr2);background:var(--bg4);color:var(--txt3);border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;transition:all .15s}
.hb:hover,.hb.active{background:#1d4ed8;border-color:#1d4ed8;color:white}
#btn-theme{padding:4px 9px;border:1px solid var(--bdr2);background:var(--bg4);border-radius:6px;cursor:pointer;font-size:15px;line-height:1.4;transition:all .15s;color:var(--txt)}
#btn-theme:hover{background:var(--bg5)}
#graph-area{flex:1;position:relative;overflow:hidden;background:var(--g-bg);transition:background .25s}
#graph-svg{width:100%;height:100%}
#hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;transition:opacity .5s}
#hint h2{font-size:22px;font-weight:800;color:var(--acc);margin-bottom:8px}
#hint p{font-size:13px;color:var(--txt4)}
#slide{position:absolute;top:0;right:0;width:460px;height:100%;background:var(--bg3);border-left:1px solid var(--bdr2);transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);z-index:20;display:flex;flex-direction:column;overflow:hidden}
#slide.open{transform:translateX(0)}
#slide-hdr{padding:14px 16px;background:var(--bg2);border-bottom:1px solid var(--bdr2);display:flex;align-items:center;gap:10px;flex-shrink:0}
#slide-title{font-weight:700;font-size:14px;flex:1}
#slide-close{width:28px;height:28px;background:var(--bg5);border:none;color:var(--txt3);border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
#slide-close:hover{background:var(--bg6);color:var(--txt)}
#slide-tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--bdr2);padding:0 4px;flex-shrink:0;overflow-x:hidden}
#slide-tabs-mc{display:none;background:var(--bg2);border-bottom:1px solid var(--bdr2);padding:0 4px;flex-shrink:0}
.sl-tab{padding:9px 8px;font-size:11px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;color:var(--txt4);white-space:nowrap;flex:1;text-align:center}
.sl-tab.active{border-bottom-color:var(--acc);color:var(--txt)}
#slide-body{flex:1;overflow-y:auto;padding:14px;background:var(--bg3)}
.cls-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;margin-bottom:4px}
.cls-sub-lbl{font-size:11px;color:var(--txt4);margin-top:2px}
.prop-chip{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;margin:2px;background:var(--bg5);color:var(--acc2);font-family:monospace}
.rel-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--bdr2);font-size:11px}
.rel-arrow{color:var(--txt4);flex-shrink:0}
.rel-lbl{color:var(--acc);font-weight:600;flex:1}
.rel-target{color:var(--txt2)}
.sub-item{border-radius:8px;padding:10px;margin-bottom:7px;cursor:pointer;border:1.5px solid var(--bdr2);background:var(--bg4);transition:all .2s}
.sub-item:hover{border-color:var(--bg6);background:var(--bg5)}
.sub-item.active{border-color:var(--acc);background:var(--bg-sel)}
.si-name{font-weight:700;font-size:12px;margin-bottom:4px;color:var(--txt)}
.si-meta{font-size:10px;color:var(--txt4);display:flex;gap:8px;flex-wrap:wrap}
.si-amt{font-size:15px;font-weight:800;color:var(--gold);margin-top:4px}
.det-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bdr2);font-size:12px}
.det-row:last-child{border-bottom:none}
.det-lbl{color:var(--txt4)}
.det-val{font-weight:700;color:var(--txt)}
#btn-sample{padding:5px 12px;border:1px solid #f59e0b66;background:#451a0322;color:#f59e0b;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;transition:all .15s}
#btn-sample:hover,#btn-sample.active{background:#92400e;border-color:#f59e0b;color:#fde68a}
.inst-step{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--bdr2);align-items:flex-start}
.inst-step:last-child{border-bottom:none}
.inst-node-badge{min-width:110px;padding:4px 8px;border-radius:6px;font-size:9px;font-weight:800;letter-spacing:.03em;text-align:center}
.inst-vals{flex:1}
.inst-val-row{font-size:11px;color:var(--txt2);margin-bottom:2px}
.inst-val-key{color:var(--txt4);font-size:10px}
.inst-calc-box{margin-top:14px;padding:14px;background:var(--bg4);border-radius:10px;border:1.5px solid #fbbf2466}
.inst-calc-title{font-size:10px;font-weight:700;color:#fbbf24;margin-bottom:8px;letter-spacing:.04em}
.inst-calc-eq{font-size:20px;font-weight:900;color:#fde68a;text-align:center;margin:8px 0}
.inst-calc-detail{font-size:11px;color:var(--txt3);text-align:center}
.det-tot{background:var(--bg-sel);border-radius:8px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.det-tot-lbl{font-size:11px;color:var(--acc2)}
.det-tot-val{font-size:18px;font-weight:800;color:var(--gold)}
.wi-lbl{font-size:10px;color:var(--txt4);font-weight:600;margin-bottom:4px}
.wi-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.wi-slider{flex:1;accent-color:var(--acc)}
.wi-val{width:40px;text-align:right;font-size:11px;font-weight:700;color:var(--acc)}
.wi-input{width:100%;padding:7px 9px;background:var(--bg5);border:1px solid var(--bg6);border-radius:6px;color:var(--txt);font-size:12px}
.wi-btn{width:100%;padding:9px;background:#7c3aed;border:none;border-radius:7px;color:white;font-size:12px;font-weight:700;cursor:pointer;margin-top:8px}
.wi-btn-reset{background:var(--wi-rst);color:var(--txt);margin-top:4px;border:1px solid var(--bdr2)}
.cmp-table{width:100%;border-collapse:collapse;font-size:11px}
.cmp-table th{background:var(--bg5);padding:6px;text-align:left;color:var(--txt4);font-weight:600;border-bottom:1px solid var(--bg6)}
.cmp-table td{padding:6px;border-bottom:1px solid var(--bdr2);color:var(--txt)}
.dp{color:var(--grn);font-weight:700}
.dn{color:var(--red);font-weight:700}
.bdg{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600}
.bo{background:#d9730033;color:#e3b341}
.bb{background:#1f6feb33;color:#60a5fa}
.br{background:#f851491a;color:#f85149}
#gtip{position:absolute;background:var(--bg3);border:1px solid var(--bdr2);border-radius:8px;padding:9px 11px;pointer-events:none;font-size:11px;max-width:200px;display:none;z-index:50;line-height:1.7;box-shadow:0 8px 24px var(--shd);color:var(--txt)}
.nd{cursor:pointer}
.nr{rx:8;ry:8;stroke-width:1.5;transition:all .3s}
.nr.abs{stroke-dasharray:5 3}
.nl{font-size:10.5px;fill:var(--g-nl);text-anchor:middle;dominant-baseline:middle;pointer-events:none;font-weight:700}
.ns{font-size:8px;fill:var(--g-ns);text-anchor:middle;dominant-baseline:middle;pointer-events:none}
.lp{fill:none;stroke-width:1.3}
.ll{font-size:7.5px;fill:var(--g-ll);text-anchor:middle;dominant-baseline:middle;pointer-events:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.path-animated .nr{animation:pulse 1.2s ease-in-out infinite}
.dn2 .nr,.dn2 .nl,.dn2 .ns{opacity:.08}
.dl2{opacity:.04!important}
#counter{position:absolute;bottom:14px;left:14px;background:var(--g-cnt-bg);backdrop-filter:blur(4px);border:1px solid var(--g-cnt-bdr);border-radius:8px;padding:7px 12px;font-size:11px;color:var(--g-cnt-txt);transition:background .25s,border-color .25s}
#counter span{color:var(--acc);font-weight:700}
#path-btn{position:absolute;bottom:14px;left:140px;background:#7c3aed;border:none;border-radius:8px;padding:7px 14px;color:white;font-size:11px;font-weight:700;cursor:pointer;display:none}
#path-btn:hover{background:#6d28d9}
.cat-hdr{padding:5px 8px;margin:10px 0 3px;border-radius:0 4px 4px 0;display:flex;justify-content:space-between;align-items:center}
.cat-hdr-lbl{font-size:10px;font-weight:700}
.cat-hdr-amt{font-size:10px;color:var(--txt4)}
.det-row-zero{opacity:.35}
.neg-amt{color:var(--grn)!important}
.srch-bar{display:flex;gap:5px;margin-bottom:10px;align-items:center}
.srch-input{flex:1;padding:6px 9px;background:var(--bg5);border:1px solid var(--bg6);border-radius:6px;color:var(--txt);font-size:11px;outline:none}
.srch-input:focus{border-color:var(--acc)}
.srch-select{padding:6px 6px;background:var(--bg5);border:1px solid var(--bg6);border-radius:6px;color:var(--txt);font-size:10px;outline:none;cursor:pointer}
.srch-chip{padding:3px 8px;border-radius:10px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--bdr2);background:var(--bg5);color:var(--txt4);white-space:nowrap}
.srch-chip.on{background:#1d4ed8;border-color:#1d4ed8;color:white}
.mvno-card{background:var(--bg4);border:1px solid var(--bdr2);border-radius:10px;padding:12px;margin-bottom:10px}
.mvno-card-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.mvno-card-title{font-size:11px;font-weight:700;color:var(--txt)}
.mvno-card-badge{font-size:9px;padding:2px 7px;border-radius:8px;font-weight:700}
.mvno-sum-row{display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:1px solid var(--bdr2)}
.mvno-sum-row:last-child{border-bottom:none}
.mvno-sum-lbl{color:var(--txt4);font-size:10px}
.mvno-sum-val{font-weight:700;color:var(--txt)}
.mvno-grand{background:linear-gradient(135deg,var(--bg-sel),var(--bg4));border:1px solid var(--acc);border-radius:10px;padding:12px;margin-bottom:10px}
.mvno-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.mvno-stat{background:var(--bg4);border:1px solid var(--bdr2);border-radius:8px;padding:8px 10px;text-align:center}
.mvno-stat-val{font-size:14px;font-weight:800;color:var(--gold)}
.mvno-stat-lbl{font-size:9px;color:var(--txt4);margin-top:2px}
.prod-section{margin-bottom:12px}
.prod-hdr{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:var(--bg5);border-radius:7px;cursor:pointer;margin-bottom:4px;border:1px solid var(--bdr2)}
.prod-hdr:hover{background:var(--bg6)}
.prod-hdr-name{font-size:11px;font-weight:700;color:var(--txt)}
.prod-hdr-meta{font-size:10px;color:var(--txt4)}
.prod-hdr-amt{font-size:12px;font-weight:800;color:var(--gold)}
.prod-body{display:none;padding:0 4px}
.prod-body.open{display:block}
#tree-svg{width:100%;height:100%;display:none;position:absolute;top:0;left:0}
.tlink{fill:none;stroke:var(--g-lsub);stroke-width:1.5;opacity:.7}
.tnode-rect{stroke-width:1.5;transition:stroke .2s,fill .2s}
.tnode-mno{fill:#7c3aed22;stroke:#7c3aed}
.tnode-mvno{fill:var(--bg4);stroke:var(--acc)}
.tnode-lbl{font-size:10px;fill:var(--g-nl);font-weight:700;pointer-events:none}
.tnode-lbl-mno{font-size:13px;fill:#c084fc;font-weight:800}
.tnode-amt{font-size:9px;fill:#fbbf24;pointer-events:none}
.tnode-sub{font-size:8px;fill:var(--g-ns);pointer-events:none}
.vb{padding:5px 11px;border:1px solid var(--bdr2);background:var(--bg4);color:var(--txt3);border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;transition:all .15s}
.vb.active{background:#7c3aed;border-color:#7c3aed;color:white}
#slide-drag{position:absolute;left:0;top:0;bottom:0;width:5px;cursor:col-resize;z-index:30;background:transparent;transition:background .15s}
#slide-drag:hover,#slide-drag.dragging{background:var(--acc);opacity:.55}
#tree-counter{position:absolute;bottom:14px;left:14px;background:var(--g-cnt-bg);backdrop-filter:blur(4px);border:1px solid var(--g-cnt-bdr);border-radius:8px;padding:7px 12px;font-size:11px;color:var(--g-cnt-txt);display:none}
#tree-counter span{color:var(--acc);font-weight:700}
#mvno-style-bar{position:absolute;top:10px;left:50%;transform:translateX(-50%);display:none;align-items:center;gap:4px;background:var(--g-cnt-bg);backdrop-filter:blur(8px);border:1px solid var(--g-cnt-bdr);border-radius:20px;padding:4px 8px;z-index:15}
.sb{padding:4px 13px;border:none;background:transparent;color:var(--g-cnt-txt);border-radius:14px;cursor:pointer;font-size:11px;font-weight:600;transition:all .15s;white-space:nowrap}
.sb:hover{background:var(--bg5)}
.sb.active{background:var(--acc);color:white}
.sb-sep{width:1px;height:16px;background:var(--g-cnt-bdr);display:inline-block;margin:0 2px}
.sb-legend{font-size:10px;color:var(--g-cnt-txt);padding-left:8px;display:flex;align-items:center;gap:5px;white-space:nowrap}
.ghost-dot{width:12px;height:12px;border-radius:50%;border:1.5px dashed #94a3b8;display:inline-block;flex-shrink:0}
/* ── M코드 슬라이드 전용 ── */
.mc-tbl{width:100%;border-collapse:collapse;font-size:11px;margin-top:4px}
.mc-tbl th{background:var(--bg4);padding:6px 8px;text-align:left;color:var(--txt4);font-weight:600;border-bottom:1px solid var(--bg6);white-space:nowrap;font-size:10px}
.mc-tbl td{padding:6px 8px;border-bottom:1px solid var(--bdr2);color:var(--txt);font-size:11px}
.mc-tbl tr:hover td{background:var(--bg5)}
.mc-tbl td.num{text-align:right;font-weight:700}
.mc-tbl tr.tot-row td{background:var(--bg-sel);font-weight:800;color:var(--gold)}
.mc-inst-item{border-radius:8px;padding:10px;margin-bottom:7px;cursor:pointer;border:1.5px solid var(--bdr2);background:var(--bg4);transition:all .2s}
.mc-inst-item:hover{border-color:#ef444488;background:var(--bg5)}
.mc-inst-item.active{border-color:#ef4444;background:#ef444411}
.mc-calc-box{margin-top:10px;padding:12px;background:var(--bg5);border-radius:8px;border:1.5px solid #ef444455}
.mc-plan-card{background:var(--bg4);border:1px solid var(--bdr2);border-radius:8px;padding:10px;margin-bottom:8px}
.mc-section-hdr{font-size:10px;color:var(--txt4);font-weight:700;margin:10px 0 6px;padding-top:8px;border-top:1px solid var(--bdr2)}
.mc-section-hdr:first-child{border-top:none;margin-top:0}
</style>
</head>
<body>
<div id="hdr">
  <div>
    <h1>🔗 MVNO 정산 통합 시스템 <span style="font-size:11px;opacity:.6;font-weight:400">v4 — M코드 탭 슬라이드</span></h1>
    <div class="sub">클래스 노드 클릭 → 인스턴스 패널 슬라이드인 · M코드 클릭 → MVNO/요금제/인스턴스 탭</div>
  </div>
  <div id="hdr-btns">
    <button id="btn-theme" onclick="toggleTheme()" title="다크/화이트 모드 전환">🌙</button>
    <button class="vb active" id="btn-view-ont" onclick="switchView('ontology')">🔗 온톨로지</button>
    <button class="vb" id="btn-view-mvno" onclick="switchView('mvno')">🏢 MVNO 현황</button>
    <span style="width:1px;height:18px;background:var(--bdr2);display:inline-block;margin:0 2px;vertical-align:middle"></span>
    <button id="btn-sample" onclick="showSampleInstance()" title="나가입 고객 정산 추적 샘플">📋 나가입 샘플</button>
    <span style="width:1px;height:18px;background:var(--bdr2);display:inline-block;margin:0 2px;vertical-align:middle" id="sep-filter"></span>
    <button class="hb active" id="btn-all">전체</button>
    <button class="hb" id="btn-cls">클래스만</button>
    <button class="hb" id="btn-obj">관계만</button>
    <button class="hb" id="btn-fit">⊡ Fit</button>
    <button class="hb" id="btn-reset">초기화</button>
  </div>
</div>

<div id="graph-area">
  <svg id="graph-svg"></svg>
  <svg id="tree-svg"></svg>
  <div id="hint"><h2>클래스 노드를 클릭하세요</h2><p>온톨로지 클래스를 클릭하면<br>연관 정산 데이터가 슬라이드됩니다</p></div>
  <div id="counter">클래스 <span id="cnt-nodes">26</span>개 · 관계 <span id="cnt-links">31</span>개</div>
  <div id="tree-counter">MNO <span>1</span>개 · MVNO <span>50</span>개 · 전월 정산 현황</div>
  <div id="mvno-style-bar">
    <button class="sb active" id="btn-style-bubble" onclick="switchMVNOStyle('bubble')">🫧 버블</button>
    <button class="sb" id="btn-style-radial" onclick="switchMVNOStyle('radial')">🌐 방사형</button>
    <span class="sb-sep"></span>
    <span class="sb-legend"><span class="ghost-dot"></span> 전전달 규모</span>
  </div>
  <button id="path-btn" onclick="togglePathAnim()">✨ 정산 흐름 애니메이션</button>
  <div id="gtip"></div>
</div>

<!-- 슬라이드 패널 -->
<div id="slide">
  <div id="slide-drag"></div>
  <div id="slide-hdr">
    <div id="slide-color-bar" style="width:4px;height:28px;border-radius:2px;background:#60a5fa"></div>
    <div id="slide-title">클래스 정보</div>
    <button id="slide-close" onclick="closeSlide()">✕</button>
  </div>
  <!-- 일반 클래스 탭 -->
  <div id="slide-tabs">
    <div class="sl-tab active" data-stab="info">📐 클래스</div>
    <div class="sl-tab" data-stab="mvno">🏢 MVNO</div>
    <div class="sl-tab" data-stab="prod">📦 요금제</div>
    <div class="sl-tab" data-stab="instances">👥 인스턴스</div>
    <div class="sl-tab" data-stab="calc">🧮 정산</div>

function calcDays(join,p){
  const j=new Date(join),ps=new Date(p.year,p.month-1,1),pe=new Date(p.year,p.month,0);
  const s=j>ps?j:ps;
  return Math.min(Math.max(0,Math.floor((pe-s)/86400000)+1),p.totalDays);
}
function calcAllItems(sub,prod,rate,period,ov={}){
  const r={...rate,...ov};
  const ws=ov._sub?{...sub,...ov._sub}:sub;
  const days=calcDays(ws.joinDate,period);
  const joinedBefore=new Date(ws.joinDate)<=new Date(period.year,period.month-1,1);
  const excV=Math.max(0,(ws.usedVoice||0)-(prod.includedVoice||0));
  const excVid=Math.max(0,(ws.usedVideo||0)-(prod.includedVideo||0));
  const excSMS=Math.max(0,((ws.usedSMS||0)+(ws.usedMMSText||0)+(ws.usedMMSMedia||0))-(prod.includedSMS||0));
  const excData=Math.max(0,(ws.usedData||0)-(prod.includedData||0));
  const i01=prod.baseFee*r.wholesaleRate*(days/period.totalDays);
  const i02=ws.isPrepaid?r.subUnitPrepaid:0;
  const i03=ws.isESIM?r.subUnitESIM:0;
  const i04=joinedBefore?r.prePeriodUnit:0;
  const i05=r.postPeriodUnit;
  const i06=r.billingChargeFee;
  const i07=r.billingAgencyFee;
  const i08=r.bizSystemFee;
  const i09=r.collectionFee;
  const i10=(ws.intlVoice||0)*r.intlVoiceRate;
  const i11=(ws.intlSMS||0)*r.intlSMSRate;
  const i12=ws.isPrepaid?r.prepaidInfoFee:0;
  const i13=ws.isPrepaid?r.prepaidVAS:0;
  const i14=ws.isPrepaid?r.vasIncentive:0;
  const i15=ws.isPrepaid?(ws.prepaidChargeAmt||0)*r.prepaidChargeRate:0;
  const i16=excV*r.excessVoiceRate;
  const i17=excVid*r.excessVideoRate;
  const i18=excSMS*r.excessSMSRate;
  const i19=excData*1024*r.excessDataRate;
  const i20=(ws.usedVoice||0)*r.voiceTotalRate;
  const i21=(ws.usedVideo||0)*r.videoTotalRate;
  const i22=(ws.usedSMS||0)*r.smsTotalRate;
  const i23=(ws.usedMMSText||0)*r.mmsTextRate;
  const i24=(ws.usedMMSMedia||0)*r.mmsMediaRate;
  const i25=(ws.usedData||0)*r.dataTotalRate;
  const i26=r.minimumTotal;
  const i27=(ws.incomingVoice||0)*r.incomingFeeRate;
  const i28=(ws.usedVoice||0)*r.subVoiceTotalRate;
  const i29=(ws.usedSMS||0)*r.subSMSTotalRate;
  const i30=(ws.usedData||0)*r.subDataTotalRate;
  const base30=[i01,i02,i03,i04,i05,i06,i07,i08,i09,i10,i11,i12,i13,i14,i15,
    i16,i17,i18,i19,i20,i21,i22,i23,i24,i25,i26,i27,i28,i29,i30];
  const rsBase=base30.reduce((a,b)=>a+(b>0?b:0),0);
  const i31=rsBase*r.rsBillingRate;
  const i32=rsBase*r.rsCollectionRate;
  const i33=-(rsBase*r.rsDeductRate);
  const i34=ws.isPrepaid?0:r.postpaidVASIncentive;
  const i35=r.penalty;
  const i36=ws.hasRoaming?r.unlimitedRoamingFee:0;
  const i37=r.glCollection;
  const i38=(ws.dataPrepurchased||0)*r.dataPrepurchaseRate;
  const i39=-(rsBase*r.grDiscountRate);
  const amounts=[i01,i02,i03,i04,i05,i06,i07,i08,i09,i10,i11,i12,i13,i14,i15,
    i16,i17,i18,i19,i20,i21,i22,i23,i24,i25,i26,i27,i28,i29,i30,
    i31,i32,i33,i34,i35,i36,i37,i38,i39];
  const total=amounts.reduce((a,b)=>a+b,0);
  return{days,amounts,total,excV,excVid,excSMS,excData,rsBase};
}

// MVNO별 M코드 정산 시뮬레이션 (seededRng 선언 전이므로 함수 지연 선언)
function getMVNOSettByMcode(mcode){
  const sc=SETT_CODE_TABLE.find(x=>x.id===mcode);
  if(!sc) return [];
  const mvnos=['알뜰폰 A','스마트텔 B','모바일넷 C','링크통신 D','디지털폰 E'];
  return mvnos.map((name,mi)=>{
    const subs={};
    let seed=mi*9999+mcode.charCodeAt(1)*37;
    sc.subs.forEach((s,si)=>{
      seed=(Math.imul(1664525,seed)+1013904223)>>>0;
      const base=(seed/4294967296)*8000000+300000;
      subs[s.scode]=Math.round(base/1000)*1000;
    });
    const total=Object.values(subs).reduce((a,b)=>a+b,0);
    return{mvno:name,subs,total};
  });
}

function getSubPath(subId){
  const sub=SUBSCRIBERS.find(s=>s.id===subId);
  const prod=PRODUCTS.find(p=>p.id===sub.productId);
  const res=calcAllItems(sub,prod,RATES[sub.productId],BILLING);
  const ns=new Set(['Subscriber','Product','SettlementRate','BillingPeriod','SettlementItem','Invoice','MVNO','UsageRecord']);
  ns.add(prod.type==='bundled'?'BundledProduct':'VoiceProduct');
  ns.add('BaseFeeWholesaleItem');ns.add('AgencyFeeItem');
  ns.add('BillingAgencyFeeItem');ns.add('CollectionAgencyFeeItem');
  if(res.excV>0||res.excVid>0||res.excSMS>0||res.excData>0) ns.add('ExcessVoiceChargeItem');
  if(sub.usedVoice>0) ns.add('VoiceUsage');
  if(sub.usedData>0) ns.add('DataUsage');
  return ns;
}

(function computeLevels(){
  const parents={};
  OWL_LINKS.forEach(l=>{ if(l.type==='sub'){ (parents[l.s]=parents[l.s]||[]).push(l.t); } });
  const memo={};
  function lvl(id){
    if(memo[id]!==undefined) return memo[id];
    const ps=parents[id]||[];
    memo[id]=ps.length ? Math.max(...ps.map(lvl))+1 : 0;
    return memo[id];
  }
  nodes.forEach(n=>{ n.level=lvl(n.id); });
})();

function expandSettlementNode(nd){
  clearExpand();
  const sc=SETT_CODE_TABLE.find(x=>x.id===nd.id);

  const settColor='#ef4444', srcColor='#f97316';
  const sameMid=SETT_CODE_TABLE.filter(x=>x.mid===sc.mid);
  const allSubs=sameMid.flatMap(x=>x.subs.map(s=>({...s,midId:x.id})));
  const rawSrcSet=[...new Set(allSubs.map(s=>s.rawsrc).filter(Boolean))];
  const ndLvl=(nd.level||0), spread=55;

  const newNodes=[
    ...allSubs.map((sub,i)=>({
      id:`_exp_s_${sub.scode}`,
      _expandType:'sub', _expandData:sub, _sc:sc,
      domain:'settlement', level:ndLvl+1,
      x: nd.x+170+(Math.random()-.5)*20,
      y: nd.y+(i-allSubs.length/2)*spread,
    })),
    ...rawSrcSet.map((src,i)=>({
      id:`_exp_r_${src.replace(/\W/g,'_')}`,
      _expandType:'raw', _expandData:{src}, _sc:sc,
      domain:'source', level:ndLvl+1,
      x: nd.x-180+(Math.random()-.5)*20,
      y: nd.y+(i-rawSrcSet.length/2)*spread,
    })),
  ];
  const newLinks=[
    ...allSubs.map(sub=>({source:nd.id, target:`_exp_s_${sub.scode}`, type:'sub', _expand:true})),
    ...allSubs.filter(s=>s.rawsrc).map(sub=>({
      source:`_exp_r_${sub.rawsrc.replace(/\W/g,'_')}`,
      target:`_exp_s_${sub.scode}`, type:'obj', _expand:true,
    })),

  _expandNodesData=newNodes; _expandLinksData=newLinks;

        .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y;})
        .on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}))
      .on('click',(e)=>{
        e.stopPropagation();
        if(isRaw){
          const relSubs=allSubs.filter(s=>s.rawsrc===sub.src);
          showExpandSlide('raw',sub,sc,relSubs);
        } else {
          showExpandSlide('sub',sub,sc);
        }
      });
    ng.append('rect').attr('x',-W/2).attr('y',-H/2)
      .attr('width',W).attr('height',H).attr('rx',isRaw?8:7)
      .attr('fill',col+'22').attr('stroke',col).attr('stroke-width',2);
    if(!isRaw){
      ng.append('rect').attr('x',-W/2+4).attr('y',-H/2+4)
        .attr('width',34).attr('height',13).attr('rx',3).attr('fill',col+'55');
      ng.append('text').attr('x',-W/2+21).attr('y',-H/2+14)

      ng.append('text').attr('text-anchor','middle').attr('y',-5)
        .attr('fill','#fca5a5').attr('font-size','10px').attr('font-weight','800').text(sub.scode);
      ng.append('text').attr('text-anchor','middle').attr('y',11)
        .attr('fill','#f1f5f9').attr('font-size','9px')
        .text(sub.name.length>16?sub.name.slice(0,15)+'…':sub.name);
    } else {
      ng.append('text').attr('text-anchor','middle').attr('y',-5)
        .attr('fill','#fed7aa').attr('font-size','8px').attr('font-weight','700').text('▶ RawData');
      ng.append('text').attr('text-anchor','middle').attr('y',10)

      .on('mouseleave',()=>ng.select('rect').attr('fill',col+'22'));
  });
}

function lp(d){
  const dx=d.target.x-d.source.x,dy=d.target.y-d.source.y;
  const dr=Math.sqrt(dx*dx+dy*dy)*1.4;
  return `M${d.source.x},${d.source.y} A${dr},${dr} 0 0,1 ${d.target.x},${d.target.y}`;
}
sim.on('tick',()=>{
  linkSel.attr('d',lp);
  linkLSel.attr('x',d=>(d.source.x+d.target.x)/2).attr('y',d=>(d.source.y+d.target.y)/2);
  nodeSel.attr('transform',d=>`translate(${d.x},${d.y})`);
  if(_expandNodesData.length){
    expandG.selectAll('.exp-nd').attr('transform',d=>`translate(${d.x},${d.y})`);
    expandG.selectAll('.exp-lk').each(function(d){
      const s=d.source, t=d.target;
      if(!s||!t||!isFinite(s.x)) return;
      d3.select(this).attr('x1',s.x).attr('y1',s.y).attr('x2',t.x).attr('y2',t.y);
    });
  }
  if(_sampleActive){
    instAnnotG.selectAll('.inst-chip').attr('transform',d=>`translate(${d.x},${d.y})`);
  }
});

function fitG(){
  const b=G.node().getBBox();
  if(!b.width || !b.height) return;
  const W=gArea.clientWidth, H=gArea.clientHeight;
  const slideEl=document.getElementById('slide');
  const slideW=(currentView==='ontology' && slideEl.classList.contains('open'))
    ? slideEl.offsetWidth : 0;
  const effW=Math.max(W-slideW, 200);
  const pad=0.82;
  const s=Math.min(effW/b.width, H/b.height)*pad;
  const tx=effW/2 - s*(b.x+b.width/2);
  const ty=H/2   - s*(b.y+b.height/2);
  svg.transition().duration(700).call(zoom.transform,
    d3.zoomIdentity.translate(tx,ty).scale(s));
}

function updateGraph(){
  const subPath=State.selSub?getSubPath(State.selSub):null;
  let hi=null;
  if(_sampleActive) hi=SAMPLE_INST.path;
  else if(State.selSub) hi=subPath;
  else if(State.selClass){
    hi=new Set([State.selClass]);
    OWL_LINKS.forEach(l=>{
      if(l.s===State.selClass||l.t===State.selClass){hi.add(l.s);hi.add(l.t);}
    });
  }
  nodeSel.classed('dn2',d=>!!hi&&!hi.has(d.id));
  nodeSel.select('.nr')
    .attr('stroke',d=>{
      if(State.selClass&&d.id===State.selClass) return '#fbbf24';
      return DOMAINS[d.domain].color;
    })
    .attr('stroke-width',d=>{
      if(State.selClass&&d.id===State.selClass) return 3;
      if(hi&&hi.has(d.id)) return 2;
      return 1.5;
    })
    .attr('fill',d=>{
      if(State.selClass&&d.id===State.selClass) return DOMAINS[d.domain].color+'44';
      if(hi&&hi.has(d.id)) return DOMAINS[d.domain].color+'2a';
      return DOMAINS[d.domain].color+'1a';
    });
  linkSel.classed('dl2',d=>{
    if(!hi) return false;
    const s=typeof d.source==='object'?d.source.id:d.source;
    const t=typeof d.target==='object'?d.target.id:d.target;
    return !hi.has(s)||!hi.has(t);
  });
  linkSel.style('display',d=>{
    if(d.type==='sub'&&!State.showSub) return 'none';
    if(d.type==='obj'&&!State.showObj) return 'none';
    return null;
  });
  linkLSel.style('display',d=>{
    if(d.type==='sub'&&!State.showSub) return 'none';
    if(d.type==='obj'&&!State.showObj) return 'none';
    return null;
  });
}

function onNodeClick(d){
  if(State.selClass===d.id){ clearExpand(); closeSlide(); return; }
  State.selClass=d.id;
  State.selSub=null;
  document.getElementById('hint').style.opacity='0';
  document.getElementById('path-btn').style.display='none';
  State.pathAnim=false;
  clearExpand();
  updateGraph();
  const isMCode=!!SETT_CODE_TABLE.find(x=>x.id===d.id);
  if(isMCode){
    _selMCode=d.id; _selMCodeInst=null; _mcInstSearch='';
    openMCodeSlide(d);
    expandSettlementNode(d);
  } else {
    _selMCode=null;
    openSlide(d);
  }
}

function openMCodeSlide(nd){
  const sc=SETT_CODE_TABLE.find(x=>x.id===nd.id);
  if(!sc) return;
  const settColor='#ef4444';
  document.getElementById('slide-color-bar').style.background=settColor;
  document.getElementById('slide-title').textContent=`${nd.id} — ${sc.mid}`;
  document.getElementById('slide-title').style.color=settColor;
  document.getElementById('slide-tabs').style.display='none';
  document.getElementById('slide-tabs-mc').style.display='flex';
  document.querySelectorAll('.sl-content').forEach(e=>e.style.display='none');
  document.getElementById('slide').classList.add('open');
  // 탭 active 초기화
  document.querySelectorAll('#slide-tabs-mc .sl-tab').forEach((t,i)=>t.classList.toggle('active',i===0));
  switchMCodeTab('mc-mvno');
}

function switchMCodeTab(tab){
  document.querySelectorAll('#slide-tabs-mc .sl-tab').forEach(t=>t.classList.toggle('active',t.dataset.mctab===tab));
  const map={'mc-mvno':'sl-mc-mvno','mc-plan':'sl-mc-plan','mc-inst':'sl-mc-inst'};
  Object.values(map).forEach(id=>{ const el=document.getElementById(id); if(el) el.style.display='none'; });
  const activeEl=document.getElementById(map[tab]);
  if(activeEl) activeEl.style.display='';
  const sc=SETT_CODE_TABLE.find(x=>x.id===_selMCode);
  if(!sc) return;
  if(tab==='mc-mvno') renderMVNOSettTab(sc);
  if(tab==='mc-plan') renderPlanTab(sc);
  if(tab==='mc-inst') renderInstTab(sc);
}
document.querySelectorAll('#slide-tabs-mc .sl-tab').forEach(t=>t.onclick=()=>switchMCodeTab(t.dataset.mctab));

  const rows=[];

  if(inst.excess!==undefined) rows.push(['초과량',inst.excess+(inst.mcode==='M0003'&&inst.scode==='S0007'?'MB':'분')]);
  if(inst.used!==undefined) rows.push(['사용량',inst.used+(inst.scode==='S0016'?'GB':'분')]);
  if(inst.fee!==undefined) rows.push(['수수료',inst.fee+'원/건']);
  if(inst.rsBase) rows.push(['RS기준금액',fmtN(inst.rsBase)]);
  const amtColor=inst.settAmt<0?'var(--grn)':'#fde68a';
  return `<div class="mc-calc-box">
    <div style="font-size:10px;font-weight:700;color:#ef4444;margin-bottom:8px">🧮 정산 계산</div>
    <table style="width:100%;font-size:10px;margin-bottom:8px">

      ${rows.map(([k,v])=>`<tr><td style="color:var(--txt4);padding:2px 0">${k}</td><td style="font-weight:700;text-align:right">${v}</td></tr>`).join('')}
    </table>
    <div style="font-size:18px;font-weight:900;color:${amtColor};text-align:center;padding:6px 0;border-top:1px solid var(--bdr2)">${fmtN(inst.settAmt)}</div>
    ${inst.calc?`<div style="font-size:10px;color:var(--txt3);text-align:center;margin-top:4px">${inst.calc}</div>`:''}
  </div>`;
}

window.selectMCodeInst=function(instId, mcodeId){

  renderInstTab(sc);

    const inst=SETT_INSTANCES.find(i=>i.id===instId);
    const hi=new Set(['CustomerRegistration','Product','SettlementRate',mcodeId,'BaseFeeWholesaleItem','SettlementItem','Invoice']);
    nodeSel.classed('dn2',d=>!hi.has(d.id));
    nodeSel.select('.nr').attr('stroke-width',d=>hi.has(d.id)?2:1.5);
    linkSel.classed('dl2',d=>{
      const s=typeof d.source==='object'?d.source.id:d.source;
      const t=typeof d.target==='object'?d.target.id:d.target;

};

function closeSlide(){
  document.getElementById('slide').classList.remove('open');
  clearExpand();
  if(_sampleActive) clearSampleInstance();
  document.getElementById('slide-tabs').style.display='';
  document.getElementById('slide-tabs-mc').style.display='none';
  const det=document.getElementById('sl-mvno-det');
  if(det) det.style.display='none';
  _selMCode=null; _selMCodeInst=null; _mcInstSearch='';
  if(currentView==='ontology'){
    State.selClass=null; State.selSub=null;
    State.pathAnim=false;
    document.getElementById('path-btn').style.display='none';
    nodeSel.classed('dn2',false).classed('path-animated',false);

    document.getElementById('hint').style.opacity='1';

}

function calcAllRes(){
  return SUBSCRIBERS.map(sub=>{
    const prod=PRODUCTS.find(p=>p.id===sub.productId);
    const res=calcAllItems(sub,prod,RATES[sub.productId],BILLING);
    return{sub,prod,res};
  });
}

  const grandAmts=new Array(39).fill(0);
  allRes.forEach(({res})=>res.amounts.forEach((a,i)=>{grandAmts[i]+=a;}));
  const grandTotal=grandAmts.reduce((a,b)=>a+b,0);
  const grandNeg=grandAmts.filter(a=>a<0).reduce((a,b)=>a+b,0);
  let h=`<div class="mvno-grand">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <span style="font-size:16px">🏢</span>
      <div><div style="font-size:13px;font-weight:800;color:var(--txt)">MVNO_ABC</div>

    </div>
    <div class="mvno-stat-grid">
      <div class="mvno-stat"><div class="mvno-stat-val">${SUBSCRIBERS.length}명</div><div class="mvno-stat-lbl">총 가입자</div></div>
      <div class="mvno-stat"><div class="mvno-stat-val">${PRODUCTS.length}종</div><div class="mvno-stat-lbl">운용 요금제</div></div>
      <div class="mvno-stat"><div class="mvno-stat-val" style="color:var(--grn)">${fmtN(grandNeg)}</div><div class="mvno-stat-lbl">공제·인센티브</div></div>
      <div class="mvno-stat"><div class="mvno-stat-val">${fmtN(grandTotal)}</div><div class="mvno-stat-lbl">순 정산 합계</div></div>
    </div>
  </div>
  <div style="font-size:10px;color:var(--txt4);font-weight:700;margin:12px 0 6px">📊 정산항목별 전체 합계</div>`;
  SETT_CATS.forEach(cat=>{
    const catDefs=SETT_DEFS.filter(d=>d.cat===cat.id);
    const catAmts=catDefs.map(d=>{const i=parseInt(d.id.slice(1))-1;return grandAmts[i];});
    const catTotal=catAmts.reduce((a,b)=>a+b,0);

    h+=`<div class="cat-hdr" style="background:${cat.color}18;border-left:3px solid ${cat.color}">
      <span class="cat-hdr-lbl" style="color:${cat.color}">${cat.name}</span>

      const amt=catAmts[i]; if(amt===0) return;

    });

  h+=`<div style="display:flex;justify-content:space-between;padding:10px 0;margin-top:8px;border-top:1px solid var(--bdr2)">

    <span style="font-size:14px;font-weight:800;color:var(--gold)">${fmtN(grandTotal)}</span></div>`;
  document.getElementById('sl-mvno').innerHTML=h;
}

const prevM=_now.getMonth()===0?12:_now.getMonth();
const prevY=_now.getMonth()===0?_now.getFullYear()-1:_now.getFullYear();
const PREV_BILLING={year:prevY,month:prevM,totalDays:new Date(prevY,prevM,0).getDate()};

function seededRng(seed){let s=seed>>>0;return()=>{s=(Math.imul(1664525,s)+1013904223)>>>0;return s/4294967296;};}
const MVNO_SUFFIXES=['알뜰폰','스마트텔','모바일넷','링크통신','디지털폰','에코텔','넥스트모바일','스피드텔','클라우드통신','원패스'];
const MVNO_DATA=(()=>{
  const d=[];
  for(let i=1;i<=50;i++){
    const r=seededRng(i*31337+999);
    const id=`MVNO_${String(i).padStart(3,'0')}`;
    const nm=MVNO_SUFFIXES[(i-1)%MVNO_SUFFIXES.length]+' '+String.fromCharCode(64+Math.ceil(i/MVNO_SUFFIXES.length));
    const subCount=Math.floor(r()*5000)+100;
    const prodCount=Math.floor(r()*5)+1;
    const cats={};
    SETT_CATS.forEach((cat,ci)=>{
      const r2=seededRng(i*777+ci*113+42);
      const base=r2()*15000000+500000;
      cats[cat.id]=cat.id==='rs'?-Math.round(base*.25/1000)*1000:Math.round(base/1000)*1000;
    });
    const total=Object.values(cats).reduce((a,b)=>a+b,0);
    d.push({id,name:nm,subCount,prodCount,cats,total});
  }
  return d;
})();

const ppM=prevM===1?12:prevM-1;
const ppY=prevM===1?prevY-1:prevY;
const PREV_PREV_BILLING={year:ppY,month:ppM,totalDays:new Date(ppY,ppM,0).getDate()};
const MVNO_DATA_PP=(()=>{
  const d=[];
  for(let i=1;i<=50;i++){
    const r=seededRng(i*31337+555);
    const m=MVNO_DATA[i-1];
    const cats={};
    SETT_CATS.forEach((cat,ci)=>{
      const r2=seededRng(i*555+ci*77+11);
      const base=r2()*13000000+400000;
      cats[cat.id]=cat.id==='rs'?-Math.round(base*.25/1000)*1000:Math.round(base/1000)*1000;
    });
    const total=Object.values(cats).reduce((a,b)=>a+b,0);
    d.push({id:m.id,name:m.name,subCount:Math.floor(r()*4500)+80,prodCount:m.prodCount,cats,total});
  }
  return d;
})();

  document.getElementById('btn-style-radial').classList.toggle('active',style==='radial');
  renderMVNOTree();
}

function getEffectiveGraphDims(){
  const ga=document.getElementById('graph-area');
  const W=ga.clientWidth, H=ga.clientHeight;
  const slideEl=document.getElementById('slide');
  const isOpen=slideEl.classList.contains('open')||(currentView==='mvno');
  const slideW=isOpen?slideEl.offsetWidth:0;
  const effW=Math.max(W-slideW,160);
  return{W,H,effW,cx:effW/2,cy:H/2};
}

function renderMVNOTree(){
  treeSvg.selectAll('*').remove();
  treeSvg.on('zoom',null);
  selMVNO=null; _selHighlight=null;
  treeSvg.on('mousemove',e=>{
    const r=document.getElementById('graph-area').getBoundingClientRect();
    tip.style.left=(e.clientX-r.left+14)+'px';
    tip.style.top=(e.clientY-r.top-10)+'px';
  });
  treeSvg.on('click.bg',()=>{if(selMVNO){selMVNO=null;closeSlide();}});
  if(mvnoStyle==='bubble') renderBubbleChart();
  else renderRadialChart();
}

function getMVNOColorScale(){
  const totals=MVNO_DATA.map(d=>Math.abs(d.total)).sort((a,b)=>a-b);
  return d3.scaleQuantile().domain(totals).range(['#ef4444','#f97316','#f59e0b','#3b82f6','#10b981']);
}
function getMVNORScale(){
  const totals=MVNO_DATA.map(d=>Math.abs(d.total));
  return d3.scaleSqrt().domain([d3.min(totals),d3.max(totals)]).range([14,54]);
}

function renderBubbleChart(){
  const {W,H,effW,cx,cy}=getEffectiveGraphDims();
  const colorScale=getMVNOColorScale();
  const rScale=getMVNORScale();
  const bNodes=MVNO_DATA.map((m,i)=>({
    ...m, ppData:MVNO_DATA_PP[i],
    r:rScale(Math.abs(m.total)), rPP:rScale(Math.abs(MVNO_DATA_PP[i].total)),
    color:colorScale(Math.abs(m.total)),
    x:cx+(seededRng(i*99+1)()*2-1)*Math.min(effW*.3,160),
    y:cy+28+(seededRng(i*77+2)()*2-1)*Math.min(H*.25,130),
  }));
  const tG=treeSvg.append('g');
  tG.append('text').attr('x',cx).attr('y',20).attr('text-anchor','middle')
    .attr('font-size','13px').attr('font-weight','800').attr('fill','#c084fc').attr('pointer-events','none')
    .text('📡 MNO — MVNO 정산 현황');
  tG.append('text').attr('x',cx).attr('y',36).attr('text-anchor','middle')
    .attr('font-size','10px').attr('fill','#475569').attr('pointer-events','none')
    .text(`${PREV_BILLING.year}년 ${PREV_BILLING.month}월 정산 · 원 크기 = 정산금액 비례`);
  const ghosts=tG.append('g').selectAll('.ghost').data(bNodes).enter()
    .append('circle').attr('class','ghost').attr('r',d=>d.rPP)
    .attr('fill','none').attr('stroke',d=>d.total>d.ppData.total?'#10b981':'#ef4444')
    .attr('stroke-width',1.5).attr('stroke-dasharray','5 3').attr('opacity',0.22).attr('pointer-events','none');
  const bubbles=tG.append('g').selectAll('.bbl').data(bNodes).enter()
    .append('circle').attr('class','bbl').attr('r',d=>d.r)
    .attr('fill',d=>d.color+'2a').attr('stroke',d=>d.color).attr('stroke-width',1.8)
    .style('cursor','pointer')
    .on('click',(e,d)=>{e.stopPropagation();onMVNOClick(d);})
    .on('mouseenter',(e,d)=>{if(d.id!==selMVNO) d3.select(e.currentTarget).attr('stroke','#fbbf24').attr('stroke-width',2.5).attr('fill',d.color+'50');showMVNOTip(e,d);})
    .on('mouseleave',(e,d)=>{if(d.id!==selMVNO) d3.select(e.currentTarget).attr('stroke',d.color).attr('stroke-width',1.8).attr('fill',d.color+'2a');hideTip();});
  const lblG=tG.append('g').attr('pointer-events','none');
  const idLabels=lblG.selectAll('.blbl-id').data(bNodes).enter().append('text').attr('class','blbl-id')
    .attr('text-anchor','middle').attr('font-weight','700').attr('fill','#e2e8f0')
    .attr('font-size',d=>Math.min(d.r*.3,10)+'px').attr('dy',d=>d.r>=32?'-4px':'3px')
    .text(d=>d.id.replace('MVNO_','M'));
  const amtLabels=lblG.selectAll('.blbl-amt').data(bNodes.filter(d=>d.r>=34)).enter().append('text').attr('class','blbl-amt')
    .attr('text-anchor','middle').attr('font-size','8px').attr('fill','#fbbf24').attr('dy','11px')
    .text(d=>fmtN(d.total));
  _selHighlight=(id)=>{
    bubbles.attr('stroke',d=>d.id===id?'#fbbf24':d.color)
      .attr('stroke-width',d=>d.id===id?3:1.8)
      .attr('fill',d=>d.id===id?d.color+'55':d.color+'2a');
  };
  const bSim=d3.forceSimulation(bNodes).alphaDecay(0.025)
    .force('charge',d3.forceManyBody().strength(6))
    .force('center',d3.forceCenter(cx,cy+28))
    .force('collision',d3.forceCollide(d=>d.r+3).iterations(3))
    .force('x',d3.forceX(cx).strength(0.03))
    .force('y',d3.forceY(cy+28).strength(0.03))
    .on('tick',()=>{
      ghosts.attr('cx',d=>d.x).attr('cy',d=>d.y);
      bubbles.attr('cx',d=>d.x).attr('cy',d=>d.y);
      idLabels.attr('x',d=>d.x).attr('y',d=>d.y);
      amtLabels.attr('x',d=>d.x).attr('y',d=>d.y);
    });
}

function renderRadialChart(){
  const {W,H,effW,cy:_cy}=getEffectiveGraphDims();
  const cx=effW/2, cy=_cy+18;
  const colorScale=getMVNOColorScale();
  const rScaleR=d3.scaleSqrt()
    .domain([d3.min(MVNO_DATA,d=>Math.abs(d.total)),d3.max(MVNO_DATA,d=>Math.abs(d.total))]).range([10,26]);
  const minDim=Math.min(W,H);
  const R1=minDim*.22, R2=minDim*.40;
  const tZoom=d3.zoom().scaleExtent([.35,2.5]).on('zoom',e=>tG.attr('transform',e.transform));
  treeSvg.call(tZoom);
  const tG=treeSvg.append('g');
  tG.append('text').attr('x',cx).attr('y',20).attr('text-anchor','middle')
    .attr('font-size','13px').attr('font-weight','800').attr('fill','#c084fc').attr('pointer-events','none')
    .text('📡 MNO — MVNO 정산 현황');
  tG.append('text').attr('x',cx).attr('y',35).attr('text-anchor','middle')
    .attr('font-size','10px').attr('fill','#475569').attr('pointer-events','none')
    .text(`${PREV_BILLING.year}년 ${PREV_BILLING.month}월 정산`);
  [R1,R2].forEach(r=>{
    tG.append('circle').attr('cx',cx).attr('cy',cy).attr('r',r)
      .attr('fill','none').attr('stroke','#1e3a5f').attr('stroke-width',.6)
      .attr('stroke-dasharray','3 5').attr('opacity',.4).attr('pointer-events','none');
  });
  tG.append('circle').attr('cx',cx).attr('cy',cy).attr('r',36)
    .attr('fill','#7c3aed22').attr('stroke','#7c3aed').attr('stroke-width',2).attr('pointer-events','none');
  tG.append('text').attr('x',cx).attr('y',cy-7).attr('text-anchor','middle')
    .attr('font-size','12px').attr('font-weight','800').attr('fill','#c084fc').attr('pointer-events','none').text('📡 MNO');
  tG.append('text').attr('x',cx).attr('y',cy+9).attr('text-anchor','middle')
    .attr('font-size','8px').attr('fill','#7c3aed').attr('pointer-events','none').text('통신망사업자');
  const allRingNodes=[];
  [[MVNO_DATA.slice(0,20),R1,20],[MVNO_DATA.slice(20),R2,30]].forEach(([data,ringR,total])=>{
    data.forEach((m,i)=>{
      const angle=(i/total)*2*Math.PI-Math.PI/2;
      const x=cx+ringR*Math.cos(angle); const y=cy+ringR*Math.sin(angle);
      const pp=MVNO_DATA_PP[MVNO_DATA.indexOf(m)];
      const r=rScaleR(Math.abs(m.total)); const rPP=rScaleR(Math.abs(pp.total));
      const color=colorScale(Math.abs(m.total)); const grew=m.total>pp.total;
      allRingNodes.push({m,pp,x,y,r,rPP,color,grew});
      const spokeR=38;
      tG.append('line').attr('x1',cx+spokeR*Math.cos(angle)).attr('y1',cy+spokeR*Math.sin(angle))
        .attr('x2',x).attr('y2',y).attr('stroke','#1e3a5f').attr('stroke-width',.8).attr('opacity',.55).attr('pointer-events','none');
      tG.append('circle').attr('cx',x).attr('cy',y).attr('r',rPP)
        .attr('fill','none').attr('stroke',grew?'#10b981':'#ef4444')
        .attr('stroke-width',1.5).attr('stroke-dasharray','4 3').attr('opacity',.28).attr('pointer-events','none');
      const circ=tG.append('circle').attr('id','rc-'+m.id).attr('cx',x).attr('cy',y).attr('r',r)
        .attr('fill',color+'2a').attr('stroke',color).attr('stroke-width',1.5).style('cursor','pointer');
      if(r>=13) tG.append('text').attr('x',x).attr('y',y+1).attr('text-anchor','middle').attr('dominant-baseline','middle')
        .attr('font-size',Math.min(r*.32,9)+'px').attr('font-weight','700').attr('fill','#e2e8f0')
        .attr('pointer-events','none').text(m.id.replace('MVNO_','M'));
      circ.on('click',(e)=>{e.stopPropagation();onMVNOClick(m);})
        .on('mouseenter',(e)=>{if(m.id!==selMVNO) circ.attr('stroke','#fbbf24').attr('stroke-width',2.5).attr('fill',color+'50');showMVNOTip(e,m);})
        .on('mouseleave',()=>{if(m.id!==selMVNO) circ.attr('stroke',color).attr('stroke-width',1.5).attr('fill',color+'2a');hideTip();});
    });
  });
  _selHighlight=(id)=>{
    allRingNodes.forEach(({m,color})=>{
      d3.select('#rc-'+m.id).attr('stroke',m.id===id?'#fbbf24':color)
        .attr('stroke-width',m.id===id?3:1.5).attr('fill',m.id===id?color+'55':color+'2a');
    });
  };
}

function openMVNOAllSlide(){
  const grandAmts={};
  SETT_CATS.forEach(cat=>{ grandAmts[cat.id]=0; });
  let grandTotal=0, grandNeg=0, grandSubs=0;
  MVNO_DATA.forEach(m=>{
    SETT_CATS.forEach(cat=>{ grandAmts[cat.id]+=(m.cats[cat.id]||0); });
    grandTotal+=m.total;
    grandNeg+=Object.values(m.cats).filter(v=>v<0).reduce((a,b)=>a+b,0);
    grandSubs+=m.subCount;
  });
  let ppTotal=0;
  MVNO_DATA_PP.forEach(m=>{ ppTotal+=m.total; });
  const ppDiff=grandTotal-ppTotal;
  const ppPct=Math.round((ppDiff/Math.abs(ppTotal))*100);
  let h=`<div class="mvno-grand">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <span style="font-size:26px">📡</span>
      <div>
        <div style="font-size:14px;font-weight:800;color:var(--txt)">MNO 전체 정산 현황</div>
        <div style="font-size:12px;color:var(--acc);font-weight:600">전체 MVNO ${MVNO_DATA.length}개 사업자 합산</div>
        <div style="font-size:10px;color:var(--txt4);margin-top:2px">${PREV_BILLING.year}년 ${PREV_BILLING.month}월 정산 (${PREV_BILLING.totalDays}일)</div>
      </div>
    </div>
    <div class="mvno-stat-grid">
      <div class="mvno-stat"><div class="mvno-stat-val">${MVNO_DATA.length}개</div><div class="mvno-stat-lbl">MVNO 사업자</div></div>
      <div class="mvno-stat"><div class="mvno-stat-val">${grandSubs.toLocaleString()}명</div><div class="mvno-stat-lbl">총 가입자</div></div>
      <div class="mvno-stat"><div class="mvno-stat-val" style="color:var(--grn)">${fmtN(grandNeg)}</div><div class="mvno-stat-lbl">공제·인센티브</div></div>
      <div class="mvno-stat"><div class="mvno-stat-val">${fmtN(grandTotal)}</div><div class="mvno-stat-lbl">순 정산 합계</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;padding-top:8px;border-top:1px solid var(--bdr2);margin-top:6px">
      <div style="font-size:10px"><div style="color:var(--txt4);margin-bottom:2px">MVNO당 평균</div>
        <div style="font-weight:700;color:var(--txt)">${fmtN(Math.round(grandTotal/MVNO_DATA.length))}</div></div>
      <div style="font-size:10px;border-left:1px solid var(--bdr2);padding-left:8px">
        <div style="color:var(--txt4);margin-bottom:2px">전전달(${PREV_PREV_BILLING.month}월) 대비</div>
        <div style="color:${ppDiff>=0?'var(--grn)':'var(--red)'};font-weight:700">${ppDiff>=0?'▲':'▼'} ${Math.abs(ppPct)}%</div>
      </div>
    </div>
  </div>
  <div style="font-size:10px;color:var(--txt4);font-weight:700;margin:10px 0 6px">📊 카테고리별 합산 정산</div>`;
  SETT_CATS.forEach(cat=>{
    const amt=grandAmts[cat.id]||0;
    h+=`<div class="det-row"><span style="display:flex;align-items:center;gap:6px">
      <span style="width:8px;height:8px;border-radius:50%;background:${cat.color};flex-shrink:0;display:inline-block"></span>
      <span class="det-lbl">${cat.name}</span></span>
      <span class="det-val${amt<0?' neg-amt':''}">${fmt(amt)}</span></div>`;
  });
  h+=`<div class="det-tot" style="margin-top:10px">
    <span class="det-tot-lbl">전체 MVNO 총 정산</span>
    <span class="det-tot-val">${fmtN(grandTotal)}</span></div>
  <div style="font-size:10px;color:var(--txt4);text-align:center;margin-top:12px;padding-top:8px;border-top:1px solid var(--bdr2)">노드를 클릭하면 개별 MVNO 상세 정보가 표시됩니다</div>`;
  document.getElementById('slide-title').textContent='MNO 전체 현황';
  document.getElementById('slide-color-bar').style.background='#7c3aed';
  document.getElementById('slide-title').style.color='#c084fc';
  document.getElementById('slide-tabs').style.display='none';
  document.getElementById('slide-tabs-mc').style.display='none';
  document.querySelectorAll('.sl-content').forEach(e=>e.style.display='none');
  let det=document.getElementById('sl-mvno-det');
  if(!det){det=document.createElement('div');det.id='sl-mvno-det';det.className='sl-content';document.getElementById('slide-body').appendChild(det);}
  det.innerHTML=h; det.style.display='';
  document.getElementById('slide').classList.add('open');
}

function onMVNOClick(mvno){
  selMVNO=mvno.id;
  if(_selHighlight) _selHighlight(mvno.id);
  openMVNOSlide(mvno);
}

function openMVNOSlide(mvno){
  document.getElementById('slide-title').textContent=`${mvno.id}`;
  document.getElementById('slide-color-bar').style.background='#3b82f6';
  document.getElementById('slide-title').style.color=getComputedStyle(document.documentElement).getPropertyValue('--acc').trim();
  document.getElementById('slide-tabs').style.display='none';
  document.getElementById('slide-tabs-mc').style.display='none';
  document.querySelectorAll('.sl-content').forEach(e=>e.style.display='none');
  let det=document.getElementById('sl-mvno-det');
  if(!det){det=document.createElement('div');det.id='sl-mvno-det';det.className='sl-content';document.getElementById('slide-body').appendChild(det);}
  det.innerHTML=buildMVNODetailHTML(mvno); det.style.display='';
  document.getElementById('slide').classList.add('open');
}

function buildMVNODetailHTML(mvno){
  const negTotal=Object.values(mvno.cats).filter(v=>v<0).reduce((a,b)=>a+b,0);
  const avgTotal=Math.round(MVNO_DATA.reduce((a,m)=>a+m.total,0)/MVNO_DATA.length);
  const diff=mvno.total-avgTotal;
  const ppIdx=MVNO_DATA.findIndex(m=>m.id===mvno.id);
  const pp=ppIdx>=0?MVNO_DATA_PP[ppIdx]:null;
  const ppDiff=pp?mvno.total-pp.total:0;
  const ppPct=pp?Math.round((ppDiff/Math.abs(pp.total))*100):0;
  let h=`<div class="mvno-grand">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <span style="font-size:26px">🏢</span>
      <div>
        <div style="font-size:14px;font-weight:800;color:var(--txt)">${mvno.id}</div>
        <div style="font-size:12px;color:var(--acc);font-weight:600">${mvno.name}</div>
        <div style="font-size:10px;color:var(--txt4);margin-top:2px">${PREV_BILLING.year}년 ${PREV_BILLING.month}월 정산 (${PREV_BILLING.totalDays}일)</div>
      </div>
    </div>
    <div class="mvno-stat-grid">
      <div class="mvno-stat"><div class="mvno-stat-val">${mvno.subCount.toLocaleString()}명</div><div class="mvno-stat-lbl">총 가입자</div></div>
      <div class="mvno-stat"><div class="mvno-stat-val">${mvno.prodCount}종</div><div class="mvno-stat-lbl">운용 요금제</div></div>
      <div class="mvno-stat"><div class="mvno-stat-val" style="color:var(--grn)">${fmtN(negTotal)}</div><div class="mvno-stat-lbl">공제·인센티브</div></div>
      <div class="mvno-stat"><div class="mvno-stat-val">${fmtN(mvno.total)}</div><div class="mvno-stat-lbl">순 정산 합계</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;padding-top:8px;border-top:1px solid var(--bdr2);margin-top:6px">
      <div style="font-size:10px"><div style="color:var(--txt4);margin-bottom:2px">전체 평균 대비</div>
        <div style="color:${diff>=0?'var(--grn)':'var(--red)'};font-weight:700">${diff>=0?'+':''}${fmtN(diff)}</div></div>
      ${pp?`<div style="font-size:10px;border-left:1px solid var(--bdr2);padding-left:8px">
        <div style="color:var(--txt4);margin-bottom:2px">전전달(${PREV_PREV_BILLING.month}월) 대비</div>
        <div style="color:${ppDiff>=0?'var(--grn)':'var(--red)'};font-weight:700">${ppDiff>=0?'▲':'▼'} ${Math.abs(ppPct)}%</div>
      </div>`:''}
    </div>
  </div>
  <div style="font-size:10px;color:var(--txt4);font-weight:700;margin:10px 0 6px">📊 카테고리별 정산</div>`;
  SETT_CATS.forEach(cat=>{
    const amt=mvno.cats[cat.id]||0;
    h+=`<div class="det-row"><span style="display:flex;align-items:center;gap:6px">
      <span style="width:8px;height:8px;border-radius:50%;background:${cat.color};flex-shrink:0;display:inline-block"></span>
      <span class="det-lbl">${cat.name}</span></span>
      <span class="det-val${amt<0?' neg-amt':''}">${fmt(amt)}</span></div>`;
  });
  h+=`<div class="det-tot" style="margin-top:10px">
    <span class="det-tot-lbl">${mvno.id} 총 정산</span>
    <span class="det-tot-val">${fmtN(mvno.total)}</span></div>`;
  return h;
}

function showMVNOTip(e,mvno){
  const ppIdx=MVNO_DATA.findIndex(m=>m.id===mvno.id);
  const pp=ppIdx>=0?MVNO_DATA_PP[ppIdx]:null;
  const diff=pp?mvno.total-pp.total:0;
  const pct=pp?Math.round((diff/Math.abs(pp.total))*100):0;
  tip.innerHTML=`<div style="font-weight:700;color:var(--acc)">${mvno.id}</div>
    <div style="font-size:11px;color:#9ca3af">${mvno.name}</div>
    <div style="color:var(--gold);margin-top:4px;font-weight:700">${fmtN(mvno.total)}</div>
    ${pp?`<div style="font-size:10px;color:#6b7280;margin-top:2px">${PREV_PREV_BILLING.month}월 대비 <span style="color:${diff>=0?'#10b981':'#ef4444'};font-weight:700">${diff>=0?'▲':'▼'} ${Math.abs(pct)}%</span></div>`:''}
    <div style="color:#6b7280;font-size:10px;margin-top:3px;border-top:1px solid #1e3a5f;padding-top:3px">가입자 ${mvno.subCount.toLocaleString()}명 · 요금제 ${mvno.prodCount}종</div>`;
  tip.style.display='block';
}

(()=>{
  const handle=document.getElementById('slide-drag');
  const slide=document.getElementById('slide');
  let dragging=false,startX=0,startW=0;
  handle.addEventListener('mousedown',e=>{
    dragging=true; startX=e.clientX; startW=slide.offsetWidth;
    handle.classList.add('dragging');
    document.body.style.userSelect='none';
    e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging) return;
    const dx=startX-e.clientX;
    const newW=Math.max(300,Math.min(Math.round(window.innerWidth*.65),startW+dx));
    slide.style.width=newW+'px';
  });
  document.addEventListener('mouseup',()=>{
    if(!dragging) return;
    dragging=false;
    handle.classList.remove('dragging');
    document.body.style.userSelect='';
    if(currentView==='mvno') renderMVNOTree();
  });
})();
</script>
</body>
